<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Confronter Tech Wizard Vcf Prefix Adder</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&family=Poppins:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-body: #f8fafc;
            --bg-card: #ffffff;
            --bg-input: #f1f5f9;
            --bg-hover: #e2e8f0;
            --text-primary: #1e293b;
            --text-secondary: #475569;
            --text-muted: #94a3b8;
            --accent: #3b82f6;
            --accent-hover: #2563eb;
            --accent-light: rgba(59, 130, 246, 0.1);
            --border: #e2e8f0;
            --border-focus: #3b82f6;
            --shadow: 0 4px 24px rgba(0, 0, 0, 0.06);
            --shadow-hover: 0 8px 32px rgba(0, 0, 0, 0.1);
            --success: #22c55e;
            --success-bg: rgba(34, 197, 94, 0.08);
            --info: #3b82f6;
            --info-bg: rgba(59, 130, 246, 0.08);
            --warning: #f59e0b;
            --radius: 14px;
            --radius-sm: 10px;
        }

        [data-theme="dark"] {
            --bg-body: #0f172a;
            --bg-card: #1e293b;
            --bg-input: #0f172a;
            --bg-hover: #334155;
            --text-primary: #f1f5f9;
            --text-secondary: #cbd5e1;
            --text-muted: #64748b;
            --accent: #60a5fa;
            --accent-hover: #3b82f6;
            --accent-light: rgba(96, 165, 250, 0.1);
            --border: #334155;
            --border-focus: #60a5fa;
            --shadow: 0 4px 24px rgba(0, 0, 0, 0.3);
            --shadow-hover: 0 8px 32px rgba(0, 0, 0, 0.5);
            --success: #4ade80;
            --success-bg: rgba(74, 222, 128, 0.08);
            --info: #60a5fa;
            --info-bg: rgba(96, 165, 250, 0.08);
            --warning: #fbbf24;
        }

        * { 
            box-sizing: border-box; 
            margin: 0; 
            padding: 0;
        }

        html {
            font-size: 15px;
        }

        body {
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
            background: var(--bg-body);
            color: var(--text-primary);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 24px;
            line-height: 1.5;
            transition: background-color 0.3s ease, color 0.3s ease;
        }

        .container {
            width: 100%;
            max-width: 480px;
            background: var(--bg-card);
            border-radius: var(--radius);
            padding: 32px;
            box-shadow: var(--shadow);
            border: 1px solid var(--border);
            transition: background-color 0.3s ease, border-color 0.3s ease, box-shadow 0.3s ease;
        }

        /* Header Bar */
        .header-bar {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 20px;
            padding-bottom: 16px;
            border-bottom: 1px solid var(--border);
        }

        .battery-status {
            display: flex;
            align-items: center;
            gap: 8px;
            font-family: 'Inter', monospace;
            font-size: 0.8rem;
            font-weight: 600;
            color: var(--text-secondary);
            background: var(--bg-input);
            padding: 8px 14px;
            border-radius: var(--radius-sm);
            border: 1px solid var(--border);
            transition: background-color 0.3s ease, border-color 0.3s ease;
        }

        .battery-icon {
            width: 22px;
            height: 11px;
            border: 1.5px solid var(--text-secondary);
            border-radius: 3px;
            position: relative;
            display: flex;
            align-items: center;
            padding: 1.5px;
        }

        .battery-icon::after {
            content: '';
            position: absolute;
            right: -3.5px;
            width: 2px;
            height: 5px;
            background: var(--text-secondary);
            border-radius: 0 1px 1px 0;
        }

        .battery-fill {
            height: 100%;
            border-radius: 1px;
            transition: width 0.5s ease, background-color 0.3s ease;
        }

        .battery-charging {
            color: var(--success);
            font-size: 0.85rem;
            animation: pulse 2s infinite;
        }

        @keyframes pulse {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.4; }
        }

        .theme-toggle {
            background: var(--bg-input);
            border: 1px solid var(--border);
            border-radius: 50%;
            width: 38px;
            height: 38px;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            font-size: 1.1rem;
            transition: all 0.3s ease;
            color: var(--text-primary);
        }

        .theme-toggle:hover {
            transform: scale(1.08);
            border-color: var(--accent);
            box-shadow: 0 0 12px var(--accent-light);
        }

        /* Greeting Section */
        .greeting-section {
            text-align: center;
            margin-bottom: 24px;
            padding: 18px;
            background: var(--bg-input);
            border-radius: var(--radius);
            border: 1px solid var(--border);
            position: relative;
            overflow: hidden;
            transition: background-color 0.3s ease, border-color 0.3s ease;
        }

        .greeting-section::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            height: 3px;
            background: linear-gradient(90deg, var(--accent), var(--accent-hover));
        }

        .live-clock {
            font-family: 'Poppins', sans-serif;
            font-size: 1.8rem;
            font-weight: 700;
            color: var(--accent);
            letter-spacing: 1px;
            margin-bottom: 4px;
            line-height: 1.2;
        }

        .greeting-text {
            font-family: 'Poppins', sans-serif;
            font-size: 0.85rem;
            font-weight: 600;
            color: var(--text-secondary);
            text-transform: uppercase;
            letter-spacing: 2px;
        }

        .greeting-emoji {
            font-size: 1.4rem;
            margin-bottom: 6px;
            display: block;
        }

        /* App Title */
        .app-title {
            text-align: center;
            margin-bottom: 24px;
        }

        .wizard-icon {
            font-size: 2.2rem;
            margin-bottom: 8px;
            display: block;
        }

        .app-title h1 {
            font-family: 'Poppins', sans-serif;
            font-size: 1.15rem;
            font-weight: 800;
            color: var(--text-primary);
            text-transform: uppercase;
            letter-spacing: 2px;
            margin-bottom: 4px;
            line-height: 1.3;
        }

        .app-title .subtitle {
            font-family: 'Inter', sans-serif;
            font-size: 0.8rem;
            color: var(--text-muted);
            font-weight: 500;
            letter-spacing: 3px;
            text-transform: uppercase;
        }

        /* Dropzone */
        .dropzone {
            border: 2px dashed var(--border);
            border-radius: var(--radius);
            padding: 36px 24px;
            text-align: center;
            cursor: pointer;
            transition: all 0.25s ease;
            margin-bottom: 20px;
            background: var(--bg-input);
            position: relative;
        }

        .dropzone:hover, .dropzone.dragover {
            border-color: var(--accent);
            background: var(--accent-light);
            box-shadow: 0 0 20px var(--accent-light);
        }

        .dropzone-icon { 
            font-size: 2rem; 
            margin-bottom: 10px; 
            display: block;
        }

        .dropzone-text { 
            color: var(--text-secondary); 
            font-size: 0.85rem;
            font-weight: 500;
        }

        .dropzone-text strong {
            color: var(--text-primary);
            font-weight: 700;
        }

        #fileInput { display: none; }

        /* File Loaded */
        .file-loaded {
            display: none;
            background: var(--success-bg);
            border-radius: var(--radius-sm);
            padding: 12px 16px;
            margin-bottom: 16px;
            border-left: 3px solid var(--success);
            font-size: 0.85rem;
            font-weight: 600;
            color: var(--text-primary);
            transition: background-color 0.3s ease;
        }

        .file-loaded.show { display: block; }
        .file-loaded strong { color: var(--success); }

        /* Input Group */
        .input-group {
            display: none;
            flex-direction: column;
            gap: 6px;
            margin-bottom: 16px;
        }

        .input-group.show { display: flex; }

        .input-group label {
            font-size: 0.7rem;
            color: var(--text-muted);
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: 2px;
        }

        .input-group input {
            padding: 12px 16px;
            border: 1.5px solid var(--border);
            border-radius: var(--radius-sm);
            background: var(--bg-input);
            color: var(--text-primary);
            font-size: 1rem;
            font-family: 'Inter', sans-serif;
            font-weight: 500;
            transition: all 0.25s ease;
        }

        .input-group input:focus {
            outline: none;
            border-color: var(--border-focus);
            box-shadow: 0 0 0 3px var(--accent-light);
        }

        .input-group input::placeholder {
            color: var(--text-muted);
            font-weight: 400;
        }

        /* Buttons */
        .btn {
            width: 100%;
            padding: 12px;
            border: none;
            border-radius: var(--radius-sm);
            font-size: 0.85rem;
            font-weight: 700;
            cursor: pointer;
            transition: all 0.25s ease;
            font-family: 'Inter', sans-serif;
            text-transform: uppercase;
            letter-spacing: 1.5px;
        }

        .btn-primary {
            background: var(--accent);
            color: #ffffff;
            display: none;
        }

        .btn-primary.show { display: block; }

        .btn-primary:hover { 
            background: var(--accent-hover);
            transform: translateY(-1px);
            box-shadow: 0 4px 16px var(--accent-light);
        }

        .btn-primary:active { transform: translateY(0); }

        .btn-secondary {
            background: var(--bg-input);
            color: var(--text-primary);
            margin-top: 10px;
            display: none;
            border: 1.5px solid var(--border);
        }

        .btn-secondary.show { display: block; }

        .btn-secondary:hover { 
            background: var(--bg-hover);
            border-color: var(--accent);
        }

        /* Status */
        .status {
            margin-top: 16px;
            padding: 12px 16px;
            border-radius: var(--radius-sm);
            font-size: 0.85rem;
            display: none;
            font-weight: 600;
            text-align: center;
            transition: background-color 0.3s ease, color 0.3s ease;
        }

        .status.show { display: block; }

        .status.success { 
            background: var(--success-bg); 
            color: var(--success); 
            border: 1px solid var(--success);
        }

        .status.info { 
            background: var(--info-bg); 
            color: var(--info); 
            border: 1px solid var(--info);
        }

        /* Responsive */
        @media (max-width: 480px) {
            html { font-size: 14px; }
            .container { padding: 24px; }
            .live-clock { font-size: 1.5rem; }
        }
    </style>
</head>
<body data-theme="light">
    <div class="container">
        <!-- Header Bar -->
        <div class="header-bar">
            <div class="battery-status" id="batteryStatus">
                <div class="battery-icon">
                    <div class="battery-fill" id="batteryFill" style="width: 0%"></div>
                </div>
                <span id="batteryText">--%</span>
                <span id="chargingIcon"></span>
            </div>
            <button class="theme-toggle" id="themeToggle" onclick="toggleTheme()" title="Toggle Dark/Light Mode">
                ☀️
            </button>
        </div>

        <!-- Greeting Section -->
        <div class="greeting-section">
            <span class="greeting-emoji" id="greetingEmoji">🌅</span>
            <div class="live-clock" id="liveClock">00:00:00</div>
            <div class="greeting-text" id="greetingText">Welcome</div>
        </div>

        <!-- App Title -->
        <div class="app-title">
            <span class="wizard-icon">🧙‍♂️</span>
            <h1>Confronter Tech Wizard</h1>
            <div class="subtitle">Prefix Adder</div>
        </div>

        <!-- Dropzone -->
        <div class="dropzone" id="dropzone">
            <span class="dropzone-icon">📁</span>
            <div class="dropzone-text">
                <p><strong>Drop</strong> your .vcf file here or <strong>click to browse</strong></p>
            </div>
        </div>
        <input type="file" id="fileInput" accept=".vcf,.vcard">

        <!-- File Loaded -->
        <div class="file-loaded" id="fileLoaded">
            ✅ <strong id="fileName">contacts.vcf</strong> — <span id="contactCount">0</span> contacts ready
        </div>

        <!-- Input -->
        <div class="input-group" id="inputGroup">
            <label>Prefix to Add</label>
            <input type="text" id="prefixInput" placeholder="e.g. 💛, 💫, VIP, 🇨🇦" onkeydown="if(event.key==='Enter') applyPrefix()">
        </div>

        <!-- Buttons -->
        <button class="btn btn-primary" id="applyBtn" onclick="applyPrefix()">Add to All Contacts</button>
        <button class="btn btn-secondary" id="downloadBtn" onclick="downloadVCF()">Download Confronter Modified .vcf</button>

        <!-- Status -->
        <div class="status" id="status"></div>
    </div>

    <script>
        // ========== THEME TOGGLE ==========
        let isDark = false;
        function toggleTheme() {
            isDark = !isDark;
            document.body.setAttribute('data-theme', isDark ? 'dark' : 'light');
            document.getElementById('themeToggle').textContent = isDark ? '🌙' : '☀️';
        }

        // ========== BATTERY STATUS ==========
        async function updateBattery() {
            try {
                if ('getBattery' in navigator) {
                    const battery = await navigator.getBattery();

                    function renderBattery() {
                        const level = Math.round(battery.level * 100);
                        const isCharging = battery.charging;

                        document.getElementById('batteryFill').style.width = level + '%';
                        document.getElementById('batteryText').textContent = level + '%';

                        const icon = document.getElementById('chargingIcon');
                        if (isCharging) {
                            icon.textContent = '⚡';
                            icon.className = 'battery-charging';
                        } else {
                            icon.textContent = '';
                            icon.className = '';
                        }

                        const fill = document.getElementById('batteryFill');
                        if (level <= 20) fill.style.background = '#ef4444';
                        else if (level <= 50) fill.style.background = '#f59e0b';
                        else fill.style.background = 'var(--success)';
                    }

                    renderBattery();
                    battery.addEventListener('levelchange', renderBattery);
                    battery.addEventListener('chargingchange', renderBattery);
                } else {
                    document.getElementById('batteryText').textContent = 'N/A';
                    document.getElementById('batteryFill').style.width = '0%';
                }
            } catch (e) {
                document.getElementById('batteryText').textContent = 'N/A';
                document.getElementById('batteryFill').style.width = '0%';
            }
        }
        updateBattery();

        // ========== LIVE CLOCK & GREETING ==========
        function updateClock() {
            const now = new Date();
            const hours = String(now.getHours()).padStart(2, '0');
            const minutes = String(now.getMinutes()).padStart(2, '0');
            const seconds = String(now.getSeconds()).padStart(2, '0');
            document.getElementById('liveClock').textContent = `${hours}:${minutes}:${seconds}`;

            const h = now.getHours();
            let greeting = 'Welcome';
            let emoji = '✨';

            if (h >= 5 && h < 12) { greeting = 'Good Morning'; emoji = '🌅'; }
            else if (h >= 12 && h < 17) { greeting = 'Good Afternoon'; emoji = '☀️'; }
            else if (h >= 17 && h < 21) { greeting = 'Good Evening'; emoji = '🌇'; }
            else { greeting = 'Good Night'; emoji = '🌙'; }

            document.getElementById('greetingText').textContent = greeting;
            document.getElementById('greetingEmoji').textContent = emoji;
        }
        setInterval(updateClock, 1000);
        updateClock();

        // ========== FILE HANDLING ==========
        let vcfContent = '';
        let modifiedVCF = '';
        let contactCount = 0;

        const dropzone = document.getElementById('dropzone');
        const fileInput = document.getElementById('fileInput');

        dropzone.addEventListener('click', () => fileInput.click());
        dropzone.addEventListener('dragover', (e) => { e.preventDefault(); dropzone.classList.add('dragover'); });
        dropzone.addEventListener('dragleave', () => dropzone.classList.remove('dragover'));
        dropzone.addEventListener('drop', (e) => {
            e.preventDefault();
            dropzone.classList.remove('dragover');
            if (e.dataTransfer.files.length) handleFile(e.dataTransfer.files[0]);
        });
        fileInput.addEventListener('change', (e) => { if (e.target.files.length) handleFile(e.target.files[0]); });

        function handleFile(file) {
            if (!file.name.match(/\.(vcf|vcard)$/i)) {
                showStatus('Please upload a .vcf or .vcard file', 'info');
                return;
            }
            const reader = new FileReader();
            reader.onload = (e) => {
                vcfContent = e.target.result;
                contactCount = (vcfContent.match(/BEGIN:VCARD/gi) || []).length;

                document.getElementById('fileName').textContent = file.name;
                document.getElementById('contactCount').textContent = contactCount;
                document.getElementById('fileLoaded').classList.add('show');
                document.getElementById('inputGroup').classList.add('show');
                document.getElementById('applyBtn').classList.add('show');
                document.getElementById('prefixInput').focus();

                showStatus(`${contactCount} contacts loaded! Type prefix and hit Enter.`, 'success');
            };
            reader.readAsText(file);
        }

        // ========== APPLY PREFIX ==========
        function applyPrefix() {
            const prefix = document.getElementById('prefixInput').value.trim();
            if (!prefix) { showStatus('Type a prefix first!', 'info'); return; }

            modifiedVCF = vcfContent;
            let changed = 0;

            const cards = modifiedVCF.split(/(?=BEGIN:VCARD)/i);
            const processed = cards.map(card => {
                if (!card.trim() || !card.includes('BEGIN:VCARD')) return card;

                let updated = card;

                // Update N: field — add prefix to position 4
                updated = updated.replace(/^N([^:]*):(.*?)$/gm, (match, params, value) => {
                    const parts = value.split(';');
                    while (parts.length < 5) parts.push('');
                    const existing = parts[3] || '';
                    parts[3] = existing ? prefix + ' ' + existing : prefix;
                    changed++;
                    return `N${params}:${parts.join(';')}`;
                });

                // Update FN: field — prepend prefix
                updated = updated.replace(/^FN([^:]*):(.*?)$/gm, (match, params, value) => {
                    const trimmed = value.trim();
                    if (trimmed.startsWith(prefix)) return match;
                    return `FN${params}:${prefix} ${trimmed}`;
                });

                return updated;
            });

            modifiedVCF = processed.join('');

            document.getElementById('downloadBtn').classList.add('show');
            showStatus(`"${prefix}" added to ${changed} contacts!`, 'success');
        }

        // ========== DOWNLOAD ==========
        function downloadVCF() {
            if (!modifiedVCF) { showStatus('Nothing to download yet', 'info'); return; }
            const blob = new Blob([modifiedVCF], { type: 'text/vcard' });
            const url = URL.createObjectURL(blob);
            const a = document.createElement('a');
            a.href = url;
            a.download = 'contacts_with_prefix.vcf';
            a.click();
            URL.revokeObjectURL(url);
            showStatus('Downloaded successfully!', 'success');
        }

        // ========== STATUS ==========
        function showStatus(msg, type) {
            const status = document.getElementById('status');
            status.textContent = msg;
            status.className = 'status show ' + type;
        }
    </script>
</body>
</html>

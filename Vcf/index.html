<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Instant Prefix Adder</title>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: #0f172a;
            color: #e2e8f0;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }
        .container {
            width: 100%;
            max-width: 500px;
            background: #1e293b;
            border-radius: 16px;
            padding: 40px;
            box-shadow: 0 25px 50px -12px rgba(0,0,0,0.5);
        }
        h1 {
            font-size: 1.8rem;
            margin-bottom: 8px;
            background: linear-gradient(135deg, #60a5fa, #a78bfa);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }
        .subtitle { color: #94a3b8; margin-bottom: 30px; font-size: 0.95rem; }
        
        .dropzone {
            border: 2px dashed #475569;
            border-radius: 12px;
            padding: 40px;
            text-align: center;
            cursor: pointer;
            transition: all 0.2s;
            margin-bottom: 25px;
            background: #0f172a;
        }
        .dropzone:hover, .dropzone.dragover {
            border-color: #60a5fa;
            background: #1e293b;
        }
        .dropzone-icon { font-size: 2.5rem; margin-bottom: 10px; }
        .dropzone-text { color: #94a3b8; font-size: 0.95rem; }
        #fileInput { display: none; }
        
        .file-loaded {
            display: none;
            background: #0f172a;
            border-radius: 8px;
            padding: 12px 16px;
            margin-bottom: 20px;
            border-left: 3px solid #22c55e;
        }
        .file-loaded.show { display: block; }
        .file-loaded strong { color: #22c55e; }
        
        .input-group {
            display: none;
            flex-direction: column;
            gap: 6px;
            margin-bottom: 20px;
        }
        .input-group.show { display: flex; }
        .input-group label {
            font-size: 0.85rem;
            color: #94a3b8;
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 0.05em;
        }
        .input-group input {
            padding: 14px 16px;
            border: 2px solid #334155;
            border-radius: 8px;
            background: #0f172a;
            color: #f1f5f9;
            font-size: 1.1rem;
            transition: border-color 0.2s;
        }
        .input-group input:focus {
            outline: none;
            border-color: #60a5fa;
        }
        
        .btn {
            width: 100%;
            padding: 14px;
            border: none;
            border-radius: 8px;
            font-size: 1rem;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.2s;
        }
        .btn-primary {
            background: linear-gradient(135deg, #3b82f6, #8b5cf6);
            color: white;
            display: none;
        }
        .btn-primary.show { display: block; }
        .btn-primary:hover { transform: translateY(-1px); box-shadow: 0 10px 25px -5px rgba(59,130,246,0.4); }
        .btn-secondary {
            background: #334155;
            color: #e2e8f0;
            margin-top: 10px;
            display: none;
        }
        .btn-secondary.show { display: block; }
        .btn-secondary:hover { background: #475569; }
        
        .status {
            margin-top: 20px;
            padding: 12px 16px;
            border-radius: 8px;
            font-size: 0.9rem;
            display: none;
        }
        .status.show { display: block; }
        .status.success { background: #064e3b; color: #6ee7b7; border: 1px solid #059669; }
        .status.info { background: #1e3a5f; color: #93c5fd; border: 1px solid #3b82f6; }
    </style>
</head>
<body>
    <div class="container">
        <h1>⚡ Prefix Adder</h1>
        <p class="subtitle">Add a prefix to ALL contacts instantly</p>
        
        <div class="dropzone" id="dropzone">
            <div class="dropzone-icon">📁</div>
            <div class="dropzone-text">
                <strong>Drop</strong> your .vcf file here or <strong>click to browse</strong>
            </div>
        </div>
        <input type="file" id="fileInput" accept=".vcf,.vcard">
        
        <div class="file-loaded" id="fileLoaded">
            ✅ <strong id="fileName">contacts.vcf</strong> — <span id="contactCount">0</span> contacts
        </div>
        
        <div class="input-group" id="inputGroup">
            <label>Prefix to Add</label>
            <input type="text" id="prefixInput" placeholder="e.g. Dr., Mr., +1, VIP " onkeydown="if(event.key==='Enter') applyPrefix()">
        </div>
        
        <button class="btn btn-primary" id="applyBtn" onclick="applyPrefix()">Add Prefix to All</button>
        <button class="btn btn-secondary" id="downloadBtn" onclick="downloadVCF()">⬇ Download</button>
        
        <div class="status" id="status"></div>
    </div>

    <script>
        let vcfContent = '';
        let modifiedVCF = '';
        let contactCount = 0;

        const dropzone = document.getElementById('dropzone');
        const fileInput = document.getElementById('fileInput');

        dropzone.addEventListener('click', () => fileInput.click());
        dropzone.addEventListener('dragover', (e) => { e.preventDefault(); dropzone.classList.add('dragover'); });
        dropzone.addEventListener('dragleave', () => dropzone.classList.remove('dragover'));
        dropzone.addEventListener('drop', (e) => {
            e.preventDefault();
            dropzone.classList.remove('dragover');
            if (e.dataTransfer.files.length) handleFile(e.dataTransfer.files[0]);
        });
        fileInput.addEventListener('change', (e) => { if (e.target.files.length) handleFile(e.target.files[0]); });

        function handleFile(file) {
            if (!file.name.match(/\.(vcf|vcard)$/i)) {
                showStatus('Upload a .vcf or .vcard file', 'info');
                return;
            }
            const reader = new FileReader();
            reader.onload = (e) => {
                vcfContent = e.target.result;
                contactCount = (vcfContent.match(/BEGIN:VCARD/gi) || []).length;
                
                document.getElementById('fileName').textContent = file.name;
                document.getElementById('contactCount').textContent = contactCount;
                document.getElementById('fileLoaded').classList.add('show');
                document.getElementById('inputGroup').classList.add('show');
                document.getElementById('applyBtn').classList.add('show');
                document.getElementById('prefixInput').focus();
                
                showStatus(`${contactCount} contacts loaded. Type prefix and hit Enter or click Add.`, 'success');
            };
            reader.readAsText(file);
        }

        function applyPrefix() {
            const prefix = document.getElementById('prefixInput').value;
            if (!prefix) { showStatus('Type a prefix first', 'info'); return; }
            
            modifiedVCF = vcfContent;
            let changed = 0;
            
            // Process each contact block
            const cards = modifiedVCF.split(/(?=BEGIN:VCARD)/i);
            const processed = cards.map(card => {
                if (!card.trim() || !card.includes('BEGIN:VCARD')) return card;
                
                let updated = card;
                let hasN = false;
                
                // Update N: field — add prefix to position 4 (prefixes)
                updated = updated.replace(/^N([^:]*):(.*?)$/gm, (match, params, value) => {
                    hasN = true;
                    const parts = value.split(';');
                    // Ensure 5 parts: family;given;additional;prefixes;suffixes
                    while (parts.length < 5) parts.push('');
                    // Prepend new prefix to existing prefixes (with space if existing)
                    const existing = parts[3] || '';
                    parts[3] = existing ? prefix + ' ' + existing : prefix;
                    changed++;
                    return `N${params}:${parts.join(';')}`;
                });
                
                // Update FN: field — prepend prefix to full name
                updated = updated.replace(/^FN([^:]*):(.*?)$/gm, (match, params, value) => {
                    const trimmed = value.trim();
                    // Avoid double-adding if prefix already there
                    if (trimmed.startsWith(prefix)) return match;
                    return `FN${params}:${prefix} ${trimmed}`;
                });
                
                return updated;
            });
            
            modifiedVCF = processed.join('');
            
            document.getElementById('downloadBtn').classList.add('show');
            showStatus(`✅ Added "${prefix}" to ${changed} contacts. Ready to download!`, 'success');
        }

        function downloadVCF() {
            if (!modifiedVCF) { showStatus('Nothing to download', 'info'); return; }
            const blob = new Blob([modifiedVCF], { type: 'text/vcard' });
            const url = URL.createObjectURL(blob);
            const a = document.createElement('a');
            a.href = url;
            a.download = 'contacts_with_prefix.vcf';
            a.click();
            URL.revokeObjectURL(url);
            showStatus('⬇ Downloaded!', 'success');
        }

        function showStatus(msg, type) {
            const status = document.getElementById('status');
            status.textContent = msg;
            status.className = 'status show ' + type;
        }
    </script>
</body>
</html>

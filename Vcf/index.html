<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Confronter Tech Wizard Prefix & Suffix Adder</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&family=Poppins:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-body: #f8fafc;
            --bg-card: #ffffff;
            --bg-input: #f1f5f9;
            --bg-hover: #e2e8f0;
            --text-primary: #1e293b;
            --text-secondary: #475569;
            --text-muted: #94a3b8;
            --accent: #3b82f6;
            --accent-hover: #2563eb;
            --accent-light: rgba(59, 130, 246, 0.1);
            --border: #e2e8f0;
            --border-focus: #3b82f6;
            --shadow: 0 4px 24px rgba(0, 0, 0, 0.06);
            --shadow-hover: 0 8px 32px rgba(0, 0, 0, 0.1);
            --success: #22c55e;
            --success-bg: rgba(34, 197, 94, 0.08);
            --info: #3b82f6;
            --info-bg: rgba(59, 130, 246, 0.08);
            --warning: #f59e0b;
            --warning-bg: rgba(245, 158, 11, 0.08);
            --danger: #ef4444;
            --danger-bg: rgba(239, 68, 68, 0.08);
            --radius: 14px;
            --radius-sm: 10px;
        }

        [data-theme="dark"] {
            --bg-body: #0f172a;
            --bg-card: #1e293b;
            --bg-input: #0f172a;
            --bg-hover: #334155;
            --text-primary: #f1f5f9;
            --text-secondary: #cbd5e1;
            --text-muted: #64748b;
            --accent: #60a5fa;
            --accent-hover: #3b82f6;
            --accent-light: rgba(96, 165, 250, 0.1);
            --border: #334155;
            --border-focus: #60a5fa;
            --shadow: 0 4px 24px rgba(0, 0, 0, 0.3);
            --shadow-hover: 0 8px 32px rgba(0, 0, 0, 0.5);
            --success: #4ade80;
            --success-bg: rgba(74, 222, 128, 0.08);
            --info: #60a5fa;
            --info-bg: rgba(96, 165, 250, 0.08);
            --warning: #fbbf24;
            --warning-bg: rgba(251, 191, 36, 0.08);
            --danger: #f87171;
            --danger-bg: rgba(248, 113, 113, 0.08);
        }

        * { 
            box-sizing: border-box; 
            margin: 0; 
            padding: 0;
        }

        html {
            font-size: 15px;
        }

        body {
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
            background: var(--bg-body);
            color: var(--text-primary);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 24px;
            line-height: 1.5;
            transition: background-color 0.3s ease, color 0.3s ease;
        }

        .container {
            width: 100%;
            max-width: 520px;
            background: var(--bg-card);
            border-radius: var(--radius);
            padding: 32px;
            box-shadow: var(--shadow);
            border: 1px solid var(--border);
            transition: background-color 0.3s ease, border-color 0.3s ease, box-shadow 0.3s ease;
        }

        /* Header Bar */
        .header-bar {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 20px;
            padding-bottom: 16px;
            border-bottom: 1px solid var(--border);
        }

        .battery-status {
            display: flex;
            align-items: center;
            gap: 8px;
            font-family: 'Inter', monospace;
            font-size: 0.8rem;
            font-weight: 600;
            color: var(--text-secondary);
            background: var(--bg-input);
            padding: 8px 14px;
            border-radius: var(--radius-sm);
            border: 1px solid var(--border);
            transition: background-color 0.3s ease, border-color 0.3s ease;
        }

        .battery-icon {
            width: 22px;
            height: 11px;
            border: 1.5px solid var(--text-secondary);
            border-radius: 3px;
            position: relative;
            display: flex;
            align-items: center;
            padding: 1.5px;
        }

        .battery-icon::after {
            content: '';
            position: absolute;
            right: -3.5px;
            width: 2px;
            height: 5px;
            background: var(--text-secondary);
            border-radius: 0 1px 1px 0;
        }

        .battery-fill {
            height: 100%;
            border-radius: 1px;
            transition: width 0.5s ease, background-color 0.3s ease;
        }

        .battery-charging {
            color: var(--success);
            font-size: 0.85rem;
            animation: pulse 2s infinite;
        }

        @keyframes pulse {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.4; }
        }

        .theme-toggle {
            background: var(--bg-input);
            border: 1px solid var(--border);
            border-radius: 50%;
            width: 38px;
            height: 38px;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            font-size: 1.1rem;
            transition: all 0.3s ease;
            color: var(--text-primary);
        }

        .theme-toggle:hover {
            transform: scale(1.08);
            border-color: var(--accent);
            box-shadow: 0 0 12px var(--accent-light);
        }

        /* Greeting Section */
        .greeting-section {
            text-align: center;
            margin-bottom: 24px;
            padding: 18px;
            background: var(--bg-input);
            border-radius: var(--radius);
            border: 1px solid var(--border);
            position: relative;
            overflow: hidden;
            transition: background-color 0.3s ease, border-color 0.3s ease;
        }

        .greeting-section::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            height: 3px;
            background: linear-gradient(90deg, var(--accent), var(--accent-hover));
        }

        .live-clock {
            font-family: 'Poppins', sans-serif;
            font-size: 1.8rem;
            font-weight: 700;
            color: var(--accent);
            letter-spacing: 1px;
            margin-bottom: 4px;
            line-height: 1.2;
        }

        .greeting-text {
            font-family: 'Poppins', sans-serif;
            font-size: 0.85rem;
            font-weight: 600;
            color: var(--text-secondary);
            text-transform: uppercase;
            letter-spacing: 2px;
        }

        .greeting-emoji {
            font-size: 1.4rem;
            margin-bottom: 6px;
            display: block;
        }

        /* App Title */
        .app-title {
            text-align: center;
            margin-bottom: 24px;
        }

        .wizard-icon {
            font-size: 2.2rem;
            margin-bottom: 8px;
            display: block;
        }

        .app-title h1 {
            font-family: 'Poppins', sans-serif;
            font-size: 1.15rem;
            font-weight: 800;
            color: var(--text-primary);
            text-transform: uppercase;
            letter-spacing: 2px;
            margin-bottom: 4px;
            line-height: 1.3;
        }

        .app-title .subtitle {
            font-family: 'Inter', sans-serif;
            font-size: 0.8rem;
            color: var(--text-muted);
            font-weight: 500;
            letter-spacing: 3px;
            text-transform: uppercase;
        }

        /* Dropzone */
        .dropzone {
            border: 2px dashed var(--border);
            border-radius: var(--radius);
            padding: 36px 24px;
            text-align: center;
            cursor: pointer;
            transition: all 0.25s ease;
            margin-bottom: 20px;
            background: var(--bg-input);
            position: relative;
        }

        .dropzone:hover, .dropzone.dragover {
            border-color: var(--accent);
            background: var(--accent-light);
            box-shadow: 0 0 20px var(--accent-light);
        }

        .dropzone-icon { 
            font-size: 2rem; 
            margin-bottom: 10px; 
            display: block;
        }

        .dropzone-text { 
            color: var(--text-secondary); 
            font-size: 0.85rem;
            font-weight: 500;
        }

        .dropzone-text strong {
            color: var(--text-primary);
            font-weight: 700;
        }

        #fileInput { display: none; }

        /* File Loaded */
        .file-loaded {
            display: none;
            background: var(--success-bg);
            border-radius: var(--radius-sm);
            padding: 12px 16px;
            margin-bottom: 16px;
            border-left: 3px solid var(--success);
            font-size: 0.85rem;
            font-weight: 600;
            color: var(--text-primary);
            transition: background-color 0.3s ease;
        }

        .file-loaded.show { display: block; }
        .file-loaded strong { color: var(--success); }

        /* Input Groups */
        .input-group {
            display: none;
            flex-direction: column;
            gap: 6px;
            margin-bottom: 16px;
        }

        .input-group.show { display: flex; }

        .input-group label {
            font-size: 0.7rem;
            color: var(--text-muted);
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: 2px;
        }

        .input-group input {
            padding: 12px 16px;
            border: 1.5px solid var(--border);
            border-radius: var(--radius-sm);
            background: var(--bg-input);
            color: var(--text-primary);
            font-size: 1rem;
            font-family: 'Inter', sans-serif;
            font-weight: 500;
            transition: all 0.25s ease;
        }

        .input-group input:focus {
            outline: none;
            border-color: var(--border-focus);
            box-shadow: 0 0 0 3px var(--accent-light);
        }

        .input-group input::placeholder {
            color: var(--text-muted);
            font-weight: 400;
        }

        /* Toggle Switch */
        .mode-toggle {
            display: none;
            align-items: center;
            justify-content: center;
            gap: 12px;
            margin-bottom: 16px;
            padding: 10px;
            background: var(--bg-input);
            border-radius: var(--radius-sm);
            border: 1px solid var(--border);
        }

        .mode-toggle.show { display: flex; }

        .mode-toggle span {
            font-size: 0.8rem;
            font-weight: 600;
            color: var(--text-muted);
            text-transform: uppercase;
            letter-spacing: 1px;
            transition: color 0.3s ease;
        }

        .mode-toggle span.active {
            color: var(--accent);
        }

        .switch {
            position: relative;
            display: inline-block;
            width: 48px;
            height: 26px;
        }

        .switch input {
            opacity: 0;
            width: 0;
            height: 0;
        }

        .slider {
            position: absolute;
            cursor: pointer;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: var(--border);
            transition: 0.3s;
            border-radius: 26px;
        }

        .slider::before {
            position: absolute;
            content: "";
            height: 20px;
            width: 20px;
            left: 3px;
            bottom: 3px;
            background: white;
            transition: 0.3s;
            border-radius: 50%;
        }

        .switch input:checked + .slider {
            background: var(--accent);
        }

        .switch input:checked + .slider::before {
            transform: translateX(22px);
        }

        /* Buttons */
        .btn {
            width: 100%;
            padding: 12px;
            border: none;
            border-radius: var(--radius-sm);
            font-size: 0.85rem;
            font-weight: 700;
            cursor: pointer;
            transition: all 0.25s ease;
            font-family: 'Inter', sans-serif;
            text-transform: uppercase;
            letter-spacing: 1.5px;
        }

        .btn-primary {
            background: var(--accent);
            color: #ffffff;
            display: none;
        }

        .btn-primary.show { display: block; }

        .btn-primary:hover { 
            background: var(--accent-hover);
            transform: translateY(-1px);
            box-shadow: 0 4px 16px var(--accent-light);
        }

        .btn-primary:active { transform: translateY(0); }

        .btn-secondary {
            background: var(--bg-input);
            color: var(--text-primary);
            margin-top: 10px;
            display: none;
            border: 1.5px solid var(--border);
        }

        .btn-secondary.show { display: block; }

        .btn-secondary:hover { 
            background: var(--bg-hover);
            border-color: var(--accent);
        }

        .btn-danger {
            background: var(--danger-bg);
            color: var(--danger);
            margin-top: 10px;
            display: none;
            border: 1.5px solid var(--danger);
        }

        .btn-danger.show { display: block; }

        .btn-danger:hover { 
            background: var(--danger);
            color: white;
        }

        /* Duplicate Review Section */
        .duplicate-section {
            display: none;
            margin-top: 20px;
            border-top: 1px solid var(--border);
            padding-top: 20px;
        }

        .duplicate-section.show { display: block; }

        .duplicate-header {
            display: flex;
            align-items: center;
            justify-content: space-between;
            margin-bottom: 12px;
        }

        .duplicate-header h3 {
            font-family: 'Poppins', sans-serif;
            font-size: 0.9rem;
            font-weight: 700;
            color: var(--warning);
            display: flex;
            align-items: center;
            gap: 6px;
        }

        .duplicate-count {
            background: var(--warning-bg);
            color: var(--warning);
            padding: 4px 10px;
            border-radius: 20px;
            font-size: 0.75rem;
            font-weight: 700;
        }

        .duplicate-list {
            max-height: 300px;
            overflow-y: auto;
            border: 1px solid var(--border);
            border-radius: var(--radius-sm);
            background: var(--bg-input);
        }

        .duplicate-item {
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 10px 14px;
            border-bottom: 1px solid var(--border);
            transition: background 0.2s ease;
        }

        .duplicate-item:last-child {
            border-bottom: none;
        }

        .duplicate-item:hover {
            background: var(--bg-hover);
        }

        .duplicate-item.removed {
            opacity: 0.4;
            text-decoration: line-through;
        }

        .duplicate-item.removed .dup-info {
            color: var(--text-muted);
        }

        .dup-info {
            display: flex;
            flex-direction: column;
            gap: 2px;
            flex: 1;
            min-width: 0;
        }

        .dup-name {
            font-weight: 600;
            font-size: 0.85rem;
            color: var(--text-primary);
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }

        .dup-details {
            font-size: 0.75rem;
            color: var(--text-muted);
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }

        .dup-remove-btn {
            background: var(--danger-bg);
            color: var(--danger);
            border: 1px solid var(--danger);
            border-radius: 6px;
            padding: 6px 12px;
            font-size: 0.75rem;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.2s ease;
            white-space: nowrap;
            margin-left: 10px;
        }

        .dup-remove-btn:hover {
            background: var(--danger);
            color: white;
        }

        .dup-remove-btn.restore {
            background: var(--success-bg);
            color: var(--success);
            border-color: var(--success);
        }

        .dup-remove-btn.restore:hover {
            background: var(--success);
            color: white;
        }

        .dup-remove-all {
            display: flex;
            gap: 10px;
            margin-top: 12px;
        }

        .dup-remove-all .btn {
            flex: 1;
            margin-top: 0;
            padding: 10px;
            font-size: 0.75rem;
        }

        /* Status */
        .status {
            margin-top: 16px;
            padding: 12px 16px;
            border-radius: var(--radius-sm);
            font-size: 0.85rem;
            display: none;
            font-weight: 600;
            text-align: center;
            transition: background-color 0.3s ease, color 0.3s ease;
        }

        .status.show { display: block; }

        .status.success { 
            background: var(--success-bg); 
            color: var(--success); 
            border: 1px solid var(--success);
        }

        .status.info { 
            background: var(--info-bg); 
            color: var(--info); 
            border: 1px solid var(--info);
        }

        .status.warning { 
            background: var(--warning-bg); 
            color: var(--warning); 
            border: 1px solid var(--warning);
        }

        /* Responsive */
        @media (max-width: 480px) {
            html { font-size: 14px; }
            .container { padding: 24px; }
            .live-clock { font-size: 1.5rem; }
            .duplicate-list { max-height: 250px; }
        }
    </style>
</head>
<body data-theme="light">
    <div class="container">
        <!-- Header Bar -->
        <div class="header-bar">
            <div class="battery-status" id="batteryStatus">
                <div class="battery-icon">
                    <div class="battery-fill" id="batteryFill" style="width: 0%"></div>
                </div>
                <span id="batteryText">--%</span>
                <span id="chargingIcon"></span>
            </div>
            <button class="theme-toggle" id="themeToggle" onclick="toggleTheme()" title="Toggle Dark/Light Mode">
                ☀️
            </button>
        </div>

        <!-- Greeting Section -->
        <div class="greeting-section">
            <span class="greeting-emoji" id="greetingEmoji">🌅</span>
            <div class="live-clock" id="liveClock">00:00:00</div>
            <div class="greeting-text" id="greetingText">Welcome</div>
        </div>

        <!-- App Title -->
        <div class="app-title">
            <span class="wizard-icon">🧙‍♂️</span>
            <h1>Confronter Tech Wizard</h1>
            <div class="subtitle">Prefix & Suffix Adder</div>
        </div>

        <!-- Dropzone -->
        <div class="dropzone" id="dropzone">
            <span class="dropzone-icon">📁</span>
            <div class="dropzone-text">
                <p><strong>Drop</strong> your .vcf file here or <strong>click to browse</strong></p>
            </div>
        </div>
        <input type="file" id="fileInput" accept=".vcf,.vcard">

        <!-- File Loaded -->
        <div class="file-loaded" id="fileLoaded">
            ✅ <strong id="fileName">contacts.vcf</strong> — <span id="contactCount">0</span> contacts ready
        </div>

        <!-- Mode Toggle -->
        <div class="mode-toggle" id="modeToggle">
            <span id="prefixLabel" class="active">Prefix</span>
            <label class="switch">
                <input type="checkbox" id="modeSwitch" onchange="toggleMode()">
                <span class="slider"></span>
            </label>
            <span id="suffixLabel">Suffix</span>
        </div>

        <!-- Prefix Input -->
        <div class="input-group" id="prefixGroup">
            <label>Prefix to Add</label>
            <input type="text" id="prefixInput" placeholder="e.g. Dr., Mr., VIP, +1" onkeydown="if(event.key==='Enter') applyPrefix()">
        </div>

        <!-- Suffix Input -->
        <div class="input-group" id="suffixGroup">
            <label>Suffix to Add</label>
            <input type="text" id="suffixInput" placeholder="e.g. Jr., Sr., III, PhD" onkeydown="if(event.key==='Enter') applySuffix()">
        </div>

        <!-- Buttons -->
        <button class="btn btn-primary" id="applyBtn" onclick="applyModification()">Add to All Contacts</button>
        <button class="btn btn-secondary" id="downloadBtn" onclick="downloadVCF()">Download Modified .vcf</button>

        <!-- Duplicate Review Section -->
        <div class="duplicate-section" id="duplicateSection">
            <div class="duplicate-header">
                <h3>⚠️ Duplicate Contacts Found</h3>
                <span class="duplicate-count" id="duplicateCount">0</span>
            </div>
            <div class="duplicate-list" id="duplicateList"></div>
            <div class="dup-remove-all">
                <button class="btn btn-danger" id="removeAllBtn" onclick="removeAllDuplicates()">Remove All Duplicates</button>
                <button class="btn btn-secondary" id="keepAllBtn" onclick="keepAllDuplicates()">Keep All</button>
            </div>
        </div>

        <!-- Status -->
        <div class="status" id="status"></div>
    </div>

    <script>
        // ========== THEME TOGGLE ==========
        let isDark = false;
        function toggleTheme() {
            isDark = !isDark;
            document.body.setAttribute('data-theme', isDark ? 'dark' : 'light');
            document.getElementById('themeToggle').textContent = isDark ? '🌙' : '☀️';
        }

        // ========== BATTERY STATUS ==========
        async function updateBattery() {
            try {
                if ('getBattery' in navigator) {
                    const battery = await navigator.getBattery();

                    function renderBattery() {
                        const level = Math.round(battery.level * 100);
                        const isCharging = battery.charging;

                        document.getElementById('batteryFill').style.width = level + '%';
                        document.getElementById('batteryText').textContent = level + '%';

                        const icon = document.getElementById('chargingIcon');
                        if (isCharging) {
                            icon.textContent = '⚡';
                            icon.className = 'battery-charging';
                        } else {
                            icon.textContent = '';
                            icon.className = '';
                        }

                        const fill = document.getElementById('batteryFill');
                        if (level <= 20) fill.style.background = '#ef4444';
                        else if (level <= 50) fill.style.background = '#f59e0b';
                        else fill.style.background = 'var(--success)';
                    }

                    renderBattery();
                    battery.addEventListener('levelchange', renderBattery);
                    battery.addEventListener('chargingchange', renderBattery);
                } else {
                    document.getElementById('batteryText').textContent = 'N/A';
                    document.getElementById('batteryFill').style.width = '0%';
                }
            } catch (e) {
                document.getElementById('batteryText').textContent = 'N/A';
                document.getElementById('batteryFill').style.width = '0%';
            }
        }
        updateBattery();

        // ========== LIVE CLOCK & GREETING ==========
        function updateClock() {
            const now = new Date();
            const hours = String(now.getHours()).padStart(2, '0');
            const minutes = String(now.getMinutes()).padStart(2, '0');
            const seconds = String(now.getSeconds()).padStart(2, '0');
            document.getElementById('liveClock').textContent = `${hours}:${minutes}:${seconds}`;

            const h = now.getHours();
            let greeting = 'Welcome';
            let emoji = '✨';

            if (h >= 5 && h < 12) { greeting = 'Good Morning'; emoji = '🌅'; }
            else if (h >= 12 && h < 17) { greeting = 'Good Afternoon'; emoji = '☀️'; }
            else if (h >= 17 && h < 21) { greeting = 'Good Evening'; emoji = '🌇'; }
            else { greeting = 'Good Night'; emoji = '🌙'; }

            document.getElementById('greetingText').textContent = greeting;
            document.getElementById('greetingEmoji').textContent = emoji;
        }
        setInterval(updateClock, 1000);
        updateClock();

        // ========== MODE TOGGLE ==========
        let isSuffixMode = false;
        function toggleMode() {
            isSuffixMode = document.getElementById('modeSwitch').checked;
            document.getElementById('prefixLabel').classList.toggle('active', !isSuffixMode);
            document.getElementById('suffixLabel').classList.toggle('active', isSuffixMode);
            document.getElementById('prefixGroup').classList.toggle('show', !isSuffixMode);
            document.getElementById('suffixGroup').classList.toggle('show', isSuffixMode);
            document.getElementById('applyBtn').textContent = isSuffixMode ? 'Add Suffix to All Contacts' : 'Add Prefix to All Contacts';
        }

        // ========== FILE HANDLING ==========
        let vcfContent = '';
        let modifiedVCF = '';
        let contactCount = 0;
        let parsedContacts = [];
        let removedIndices = new Set();

        const dropzone = document.getElementById('dropzone');
        const fileInput = document.getElementById('fileInput');

        dropzone.addEventListener('click', () => fileInput.click());
        dropzone.addEventListener('dragover', (e) => { e.preventDefault(); dropzone.classList.add('dragover'); });
        dropzone.addEventListener('dragleave', () => dropzone.classList.remove('dragover'));
        dropzone.addEventListener('drop', (e) => {
            e.preventDefault();
            dropzone.classList.remove('dragover');
            if (e.dataTransfer.files.length) handleFile(e.dataTransfer.files[0]);
        });
        fileInput.addEventListener('change', (e) => { if (e.target.files.length) handleFile(e.target.files[0]); });

        function parseVCF(content) {
            const cards = content.split(/(?=BEGIN:VCARD)/i).filter(c => c.trim() && c.includes('BEGIN:VCARD'));
            return cards.map((card, idx) => {
                const fnMatch = card.match(/^FN(?:[^:]*):(.*)$/m);
                const nMatch = card.match(/^N(?:[^:]*):(.*)$/m);
                const telMatches = card.match(/^TEL(?:[^:]*):(.*)$/gm) || [];
                const emailMatches = card.match(/^EMAIL(?:[^:]*):(.*)$/gm) || [];

                let displayName = fnMatch ? fnMatch[1].trim() : '';
                let nField = nMatch ? nMatch[1].trim() : '';
                let phones = telMatches.map(t => t.split(':').slice(1).join(':')).join(', ');
                let emails = emailMatches.map(e => e.split(':').slice(1).join(':')).join(', ');

                // Fallback: derive name from N field if FN missing
                if (!displayName && nField) {
                    const nParts = nField.split(';');
                    displayName = [nParts[1], nParts[2], nParts[0]].filter(Boolean).join(' ').trim();
                }

                return {
                    index: idx,
                    raw: card,
                    displayName: displayName || 'Unnamed Contact',
                    nField: nField,
                    phones: phones,
                    emails: emails,
                    key: (displayName + '|' + phones).toLowerCase().trim()
                };
            });
        }

        function findDuplicates(contacts) {
            const seen = new Map();
            const duplicates = [];

            contacts.forEach(contact => {
                const key = contact.key;
                if (!key || key === '|') return;

                if (seen.has(key)) {
                    const firstIdx = seen.get(key);
                    // Mark the later occurrence as duplicate
                    if (!duplicates.find(d => d.index === contact.index)) {
                        duplicates.push({
                            index: contact.index,
                            name: contact.displayName,
                            phones: contact.phones,
                            emails: contact.emails,
                            duplicateOf: firstIdx
                        });
                    }
                } else {
                    seen.set(key, contact.index);
                }
            });

            return duplicates;
        }

        function handleFile(file) {
            if (!file.name.match(/\.(vcf|vcard)$/i)) {
                showStatus('Please upload a .vcf or .vcard file', 'info');
                return;
            }
            const reader = new FileReader();
            reader.onload = (e) => {
                vcfContent = e.target.result;
                parsedContacts = parseVCF(vcfContent);
                contactCount = parsedContacts.length;

                document.getElementById('fileName').textContent = file.name;
                document.getElementById('contactCount').textContent = contactCount;
                document.getElementById('fileLoaded').classList.add('show');
                document.getElementById('modeToggle').classList.add('show');
                document.getElementById('prefixGroup').classList.add('show');
                document.getElementById('applyBtn').classList.add('show');
                document.getElementById('prefixInput').focus();
                removedIndices.clear();
                hideDuplicateSection();

                showStatus(`${contactCount} contacts loaded! Choose prefix/suffix mode and hit Enter.`, 'success');
            };
            reader.readAsText(file);
        }

        // ========== APPLY PREFIX/SUFFIX ==========
        function applyModification() {
            if (isSuffixMode) {
                applySuffix();
            } else {
                applyPrefix();
            }
        }

        function applyPrefix() {
            const prefix = document.getElementById('prefixInput').value.trim();
            if (!prefix) { showStatus('Type a prefix first!', 'info'); return; }

            modifiedVCF = vcfContent;
            let changed = 0;

            const cards = modifiedVCF.split(/(?=BEGIN:VCARD)/i);
            const processed = cards.map(card => {
                if (!card.trim() || !card.includes('BEGIN:VCARD')) return card;

                let updated = card;

                // Update N: field — add prefix to position 4
                updated = updated.replace(/^N([^:]*):(.*?)$/gm, (match, params, value) => {
                    const parts = value.split(';');
                    while (parts.length < 5) parts.push('');
                    const existing = parts[3] || '';
                    parts[3] = existing ? prefix + ' ' + existing : prefix;
                    changed++;
                    return `N${params}:${parts.join(';')}`;
                });

                // Update FN: field — prepend prefix
                updated = updated.replace(/^FN([^:]*):(.*?)$/gm, (match, params, value) => {
                    const trimmed = value.trim();
                    if (trimmed.startsWith(prefix)) return match;
                    return `FN${params}:${prefix} ${trimmed}`;
                });

                return updated;
            });

            modifiedVCF = processed.join('');

            // Re-parse to find duplicates after modification
            const modifiedContacts = parseVCF(modifiedVCF);
            showDuplicates(modifiedContacts);

            document.getElementById('downloadBtn').classList.add('show');
            showStatus(`"${prefix}" added to ${changed} contacts! Review duplicates below.`, 'success');
        }

        function applySuffix() {
            const suffix = document.getElementById('suffixInput').value.trim();
            if (!suffix) { showStatus('Type a suffix first!', 'info'); return; }

            modifiedVCF = vcfContent;
            let changed = 0;

            const cards = modifiedVCF.split(/(?=BEGIN:VCARD)/i);
            const processed = cards.map(card => {
                if (!card.trim() || !card.includes('BEGIN:VCARD')) return card;

                let updated = card;

                // Update N: field — add suffix to position 5 (suffix position in N field)
                updated = updated.replace(/^N([^:]*):(.*?)$/gm, (match, params, value) => {
                    const parts = value.split(';');
                    while (parts.length < 5) parts.push('');
                    const existing = parts[4] || '';
                    parts[4] = existing ? existing + ' ' + suffix : suffix;
                    changed++;
                    return `N${params}:${parts.join(';')}`;
                });

                // Update FN: field — append suffix
                updated = updated.replace(/^FN([^:]*):(.*?)$/gm, (match, params, value) => {
                    const trimmed = value.trim();
                    if (trimmed.endsWith(suffix)) return match;
                    return `FN${params}:${trimmed} ${suffix}`;
                });

                return updated;
            });

            modifiedVCF = processed.join('');

            // Re-parse to find duplicates after modification
            const modifiedContacts = parseVCF(modifiedVCF);
            showDuplicates(modifiedContacts);

            document.getElementById('downloadBtn').classList.add('show');
            showStatus(`"${suffix}" added to ${changed} contacts! Review duplicates below.`, 'success');
        }

        // ========== DUPLICATE MANAGEMENT ==========
        function showDuplicates(contacts) {
            const duplicates = findDuplicates(contacts);
            const section = document.getElementById('duplicateSection');
            const list = document.getElementById('duplicateList');
            const count = document.getElementById('duplicateCount');

            if (duplicates.length === 0) {
                hideDuplicateSection();
                return;
            }

            count.textContent = duplicates.length;
            list.innerHTML = '';

            duplicates.forEach(dup => {
                const item = document.createElement('div');
                item.className = 'duplicate-item';
                item.dataset.index = dup.index;
                item.innerHTML = `
                    <div class="dup-info">
                        <span class="dup-name">${escapeHtml(dup.name)}</span>
                        <span class="dup-details">${dup.phones ? '📞 ' + escapeHtml(dup.phones) : ''}${dup.emails ? ' ✉️ ' + escapeHtml(dup.emails) : ''}</span>
                    </div>
                    <button class="dup-remove-btn" onclick="toggleDuplicate(${dup.index}, this)">Remove</button>
                `;
                list.appendChild(item);
            });

            section.classList.add('show');
        }

        function hideDuplicateSection() {
            document.getElementById('duplicateSection').classList.remove('show');
            document.getElementById('duplicateList').innerHTML = '';
        }

        function toggleDuplicate(index, btn) {
            const item = btn.closest('.duplicate-item');
            if (removedIndices.has(index)) {
                removedIndices.delete(index);
                item.classList.remove('removed');
                btn.textContent = 'Remove';
                btn.classList.remove('restore');
            } else {
                removedIndices.add(index);
                item.classList.add('removed');
                btn.textContent = 'Restore';
                btn.classList.add('restore');
            }
            updateDuplicateCount();
        }

        function removeAllDuplicates() {
            const items = document.querySelectorAll('.duplicate-item');
            items.forEach(item => {
                const idx = parseInt(item.dataset.index);
                removedIndices.add(idx);
                item.classList.add('removed');
                const btn = item.querySelector('.dup-remove-btn');
                btn.textContent = 'Restore';
                btn.classList.add('restore');
            });
            updateDuplicateCount();
        }

        function keepAllDuplicates() {
            removedIndices.clear();
            const items = document.querySelectorAll('.duplicate-item');
            items.forEach(item => {
                item.classList.remove('removed');
                const btn = item.querySelector('.dup-remove-btn');
                btn.textContent = 'Remove';
                btn.classList.remove('restore');
            });
            updateDuplicateCount();
        }

        function updateDuplicateCount() {
            const total = document.querySelectorAll('.duplicate-item').length;
            const removed = removedIndices.size;
            document.getElementById('duplicateCount').textContent = `${total - removed} of ${total}`;
        }

        function escapeHtml(text) {
            const div = document.createElement('div');
            div.textContent = text;
            return div.innerHTML;
        }

        // ========== DOWNLOAD ==========
        function downloadVCF() {
            if (!modifiedVCF) { showStatus('Nothing to download yet', 'info'); return; }

            let finalVCF = modifiedVCF;

            // Remove marked duplicates from the VCF content
            if (removedIndices.size > 0) {
                const cards = finalVCF.split(/(?=BEGIN:VCARD)/i);
                const filtered = cards.filter((card, idx) => {
                    if (!card.trim() || !card.includes('BEGIN:VCARD')) return true;
                    return !removedIndices.has(idx);
                });
                finalVCF = filtered.join('');
            }

            const blob = new Blob([finalVCF], { type: 'text/vcard' });
            const url = URL.createObjectURL(blob);
            const a = document.createElement('a');
            a.href = url;
            a.download = 'contacts_modified.vcf';
            a.click();
            URL.revokeObjectURL(url);

            const removedCount = removedIndices.size;
            if (removedCount > 0) {
                showStatus(`Downloaded! ${removedCount} duplicate(s) removed.`, 'success');
            } else {
                showStatus('Downloaded successfully! All duplicates kept.', 'success');
            }
        }

        // ========== STATUS ==========
        function showStatus(msg, type) {
            const status = document.getElementById('status');
            status.textContent = msg;
            status.className = 'status show ' + type;
        }
    </script>
</body>
</html>

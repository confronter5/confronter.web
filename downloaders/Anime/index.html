<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>AI Image Generator - By Confronter</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=Playfair+Display:wght@700&display=swap" rel="stylesheet">
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: 'Inter', sans-serif;
      background: linear-gradient(135deg, #1a1a2e 0%, #16213e 50%, #0f3460 100%);
      color: #e0e0e0;
      display: flex;
      flex-direction: column;
      align-items: center;
      padding: 40px 20px;
      min-height: 100vh;
      position: relative;
      overflow-x: hidden;
    }

    /* Subtle animated background mesh */
    body::before {
      content: '';
      position: fixed;
      top: -50%;
      left: -50%;
      width: 200%;
      height: 200%;
      background: radial-gradient(circle at 20% 80%, rgba(233, 30, 99, 0.08) 0%, transparent 50%),
                  radial-gradient(circle at 80% 20%, rgba(76, 175, 80, 0.06) 0%, transparent 50%),
                  radial-gradient(circle at 50% 50%, rgba(156, 39, 176, 0.04) 0%, transparent 50%);
      animation: meshMove 20s ease-in-out infinite;
      pointer-events: none;
      z-index: 0;
    }

    @keyframes meshMove {
      0%, 100% { transform: translate(0, 0) rotate(0deg); }
      33% { transform: translate(2%, 2%) rotate(1deg); }
      66% { transform: translate(-1%, 1%) rotate(-1deg); }
    }

    .container {
      position: relative;
      z-index: 1;
      width: 100%;
      max-width: 1200px;
      display: flex;
      flex-direction: column;
      align-items: center;
    }

    h1 {
      font-family: 'Playfair Display', serif;
      font-size: 3rem;
      font-weight: 700;
      background: linear-gradient(135deg, #ff6b9d 0%, #e91e63 50%, #c2185b 100%);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
      margin-bottom: 8px;
      text-align: center;
      letter-spacing: -0.02em;
      animation: titleGlow 3s ease-in-out infinite alternate;
    }

    @keyframes titleGlow {
      from { filter: drop-shadow(0 0 20px rgba(233, 30, 99, 0.3)); }
      to { filter: drop-shadow(0 0 40px rgba(233, 30, 99, 0.6)); }
    }

    .subtitle {
      font-size: 1rem;
      color: rgba(255, 255, 255, 0.5);
      margin-bottom: 40px;
      font-weight: 300;
      letter-spacing: 0.05em;
    }

    .input-wrapper {
      position: relative;
      width: 90%;
      max-width: 500px;
      margin-bottom: 20px;
    }

    input[type="text"] {
      width: 100%;
      padding: 16px 24px;
      padding-right: 50px;
      background: rgba(255, 255, 255, 0.05);
      border: 2px solid rgba(233, 30, 99, 0.3);
      border-radius: 16px;
      font-size: 16px;
      color: #fff;
      outline: none;
      transition: all 0.3s ease;
      backdrop-filter: blur(10px);
    }

    input[type="text"]::placeholder {
      color: rgba(255, 255, 255, 0.3);
    }

    input[type="text"]:focus {
      border-color: #e91e63;
      box-shadow: 0 0 30px rgba(233, 30, 99, 0.2), inset 0 0 20px rgba(233, 30, 99, 0.05);
      background: rgba(255, 255, 255, 0.08);
    }

    .input-icon {
      position: absolute;
      right: 18px;
      top: 50%;
      transform: translateY(-50%);
      font-size: 20px;
      opacity: 0.5;
      pointer-events: none;
    }

    button {
      padding: 14px 40px;
      background: linear-gradient(135deg, #e91e63 0%, #c2185b 100%);
      color: white;
      border: none;
      border-radius: 16px;
      font-size: 16px;
      font-weight: 600;
      cursor: pointer;
      margin-bottom: 40px;
      transition: all 0.3s ease;
      box-shadow: 0 4px 20px rgba(233, 30, 99, 0.3);
      position: relative;
      overflow: hidden;
    }

    button::before {
      content: '';
      position: absolute;
      top: 0;
      left: -100%;
      width: 100%;
      height: 100%;
      background: linear-gradient(90deg, transparent, rgba(255,255,255,0.2), transparent);
      transition: left 0.5s ease;
    }

    button:hover::before {
      left: 100%;
    }

    button:hover {
      transform: translateY(-2px);
      box-shadow: 0 8px 30px rgba(233, 30, 99, 0.4);
    }

    button:active {
      transform: translateY(0);
    }

    button:disabled {
      opacity: 0.6;
      cursor: not-allowed;
      transform: none;
    }

    .images {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
      gap: 24px;
      width: 100%;
      max-width: 1200px;
      padding: 0 10px;
    }

    .image-card {
      display: flex;
      flex-direction: column;
      align-items: center;
      background: rgba(255, 255, 255, 0.03);
      border-radius: 20px;
      padding: 16px;
      backdrop-filter: blur(10px);
      border: 1px solid rgba(255, 255, 255, 0.06);
      transition: all 0.4s ease;
      opacity: 0;
      transform: translateY(30px);
      animation: cardEnter 0.6s ease forwards;
    }

    .image-card:nth-child(1) { animation-delay: 0.1s; }
    .image-card:nth-child(2) { animation-delay: 0.2s; }
    .image-card:nth-child(3) { animation-delay: 0.3s; }
    .image-card:nth-child(4) { animation-delay: 0.4s; }
    .image-card:nth-child(5) { animation-delay: 0.5s; }

    @keyframes cardEnter {
      to {
        opacity: 1;
        transform: translateY(0);
      }
    }

    .image-card:hover {
      transform: translateY(-8px);
      border-color: rgba(233, 30, 99, 0.3);
      box-shadow: 0 20px 40px rgba(0, 0, 0, 0.3);
    }

    .image-wrapper {
      width: 100%;
      aspect-ratio: 1;
      border-radius: 16px;
      overflow: hidden;
      position: relative;
      background: linear-gradient(135deg, rgba(233, 30, 99, 0.1), rgba(76, 175, 80, 0.1));
    }

    .image-wrapper img {
      width: 100%;
      height: 100%;
      object-fit: cover;
      border-radius: 16px;
      transition: transform 0.5s ease;
      display: block;
    }

    .image-card:hover .image-wrapper img {
      transform: scale(1.05);
    }

    .image-overlay {
      position: absolute;
      top: 0;
      left: 0;
      right: 0;
      bottom: 0;
      background: linear-gradient(to top, rgba(0,0,0,0.6) 0%, transparent 50%);
      opacity: 0;
      transition: opacity 0.3s ease;
      border-radius: 16px;
    }

    .image-card:hover .image-overlay {
      opacity: 1;
    }

    .image-number {
      position: absolute;
      top: 12px;
      left: 12px;
      background: rgba(0, 0, 0, 0.5);
      color: white;
      padding: 4px 12px;
      border-radius: 20px;
      font-size: 12px;
      font-weight: 500;
      backdrop-filter: blur(10px);
    }

    .download-btn {
      margin-top: 16px;
      background: linear-gradient(135deg, #4caf50 0%, #388e3c 100%);
      color: white;
      text-decoration: none;
      padding: 10px 28px;
      border-radius: 12px;
      font-size: 14px;
      font-weight: 600;
      transition: all 0.3s ease;
      display: inline-flex;
      align-items: center;
      gap: 8px;
      box-shadow: 0 4px 15px rgba(76, 175, 80, 0.3);
    }

    .download-btn:hover {
      transform: translateY(-2px);
      box-shadow: 0 8px 25px rgba(76, 175, 80, 0.4);
    }

    .download-btn svg {
      width: 16px;
      height: 16px;
    }

    .footer {
      margin-top: 60px;
      font-size: 14px;
      color: rgba(255, 255, 255, 0.3);
      font-weight: 300;
      letter-spacing: 0.05em;
    }

    .footer span {
      color: #e91e63;
      font-weight: 500;
    }

    /* Loading spinner */
    .loading {
      display: none;
      margin-bottom: 30px;
    }

    .loading.active {
      display: flex;
      align-items: center;
      gap: 12px;
      color: rgba(255, 255, 255, 0.6);
      font-size: 14px;
    }

    .spinner {
      width: 24px;
      height: 24px;
      border: 3px solid rgba(233, 30, 99, 0.2);
      border-top-color: #e91e63;
      border-radius: 50%;
      animation: spin 0.8s linear infinite;
    }

    @keyframes spin {
      to { transform: rotate(360deg); }
    }

    /* Falling flowers - enhanced */
    .flower {
      position: fixed;
      top: -50px;
      font-size: 24px;
      animation: fall linear infinite;
      z-index: 0;
      opacity: 0.6;
      pointer-events: none;
      text-shadow: 0 0 10px rgba(255, 105, 180, 0.5);
    }

    @keyframes fall {
      0% {
        transform: translateY(-50px) rotate(0deg) scale(0.8);
        opacity: 0;
      }
      10% {
        opacity: 0.6;
      }
      90% {
        opacity: 0.6;
      }
      100% {
        transform: translateY(110vh) rotate(720deg) scale(1.2);
        opacity: 0;
      }
    }

    /* Toast notification */
    .toast {
      position: fixed;
      bottom: 30px;
      left: 50%;
      transform: translateX(-50%) translateY(100px);
      background: rgba(233, 30, 99, 0.9);
      color: white;
      padding: 12px 24px;
      border-radius: 12px;
      font-size: 14px;
      font-weight: 500;
      backdrop-filter: blur(10px);
      transition: transform 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
      z-index: 1000;
      box-shadow: 0 10px 30px rgba(0, 0, 0, 0.3);
    }

    .toast.show {
      transform: translateX(-50%) translateY(0);
    }

    /* Responsive */
    @media (max-width: 768px) {
      h1 { font-size: 2rem; }
      .images { grid-template-columns: 1fr; }
      .image-card { max-width: 400px; margin: 0 auto; }
    }
  </style>
</head>
<body>
  <div class="container">
    <h1>🌸 AI Image Generator</h1>
    <p class="subtitle">Transform your imagination into reality</p>

    <div class="input-wrapper">
      <input type="text" id="promptInput" placeholder="Enter a prompt (e.g. Anime girl)" autocomplete="off" />
      <span class="input-icon">✨</span>
    </div>

    <button onclick="generateImages()" id="generateBtn">
      <span>Generate Images</span>
    </button>

    <div class="loading" id="loadingIndicator">
      <div class="spinner"></div>
      <span>Creating magic...</span>
    </div>

    <div class="images" id="imageContainer"></div>

    <div class="footer">© <span>Confronter</span> ²⁰²⁵</div>
  </div>

  <div class="toast" id="toast"></div>

  <!-- Falling flowers -->
  <script>
    function createFlower() {
      const flower = document.createElement('div');
      flower.className = 'flower';
      const flowers = ['🌸', '🌺', '🌷', '💮', '🏵️', '🌹'];
      flower.textContent = flowers[Math.floor(Math.random() * flowers.length)];
      flower.style.left = Math.random() * 100 + 'vw';
      flower.style.animationDuration = (4 + Math.random() * 6) + 's';
      flower.style.fontSize = (14 + Math.random() * 24) + 'px';
      flower.style.animationDelay = Math.random() * 2 + 's';
      document.body.appendChild(flower);

      setTimeout(() => flower.remove(), 12000);
    }

    setInterval(createFlower, 800);
    // Create initial batch
    for (let i = 0; i < 5; i++) setTimeout(createFlower, i * 200);
  </script>

  <!-- Image Generator -->
  <script>
    function showToast(message) {
      const toast = document.getElementById('toast');
      toast.textContent = message;
      toast.classList.add('show');
      setTimeout(() => toast.classList.remove('show'), 3000);
    }

    async function generateImages() {
      const prompt = document.getElementById("promptInput").value.trim();
      const container = document.getElementById("imageContainer");
      const btn = document.getElementById("generateBtn");
      const loading = document.getElementById("loadingIndicator");

      container.innerHTML = '';

      if (!prompt) {
        showToast("Please enter a prompt!");
        document.getElementById("promptInput").focus();
        return;
      }

      btn.disabled = true;
      loading.classList.add('active');

      const baseUrl = `https://img.hazex.workers.dev/?prompt=${encodeURIComponent(prompt)}`;

      for (let i = 0; i < 5; i++) {
        const imageUrl = `${baseUrl}&t=${Date.now()}_${i}`;
        const card = document.createElement("div");
        card.className = "image-card";

        const wrapper = document.createElement("div");
        wrapper.className = "image-wrapper";

        const img = document.createElement("img");
        img.src = imageUrl;
        img.alt = `Generated Image ${i + 1}`;
        img.loading = "lazy";

        const overlay = document.createElement("div");
        overlay.className = "image-overlay";

        const number = document.createElement("span");
        number.className = "image-number";
        number.textContent = `#${i + 1}`;

        wrapper.appendChild(img);
        wrapper.appendChild(overlay);
        wrapper.appendChild(number);

        const downloadLink = document.createElement("a");
        downloadLink.href = imageUrl;
        downloadLink.download = `image-${i + 1}.jpg`;
        downloadLink.className = "download-btn";
        downloadLink.innerHTML = `
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"></path>
            <polyline points="7 10 12 15 17 10"></polyline>
            <line x1="12" y1="15" x2="12" y2="3"></line>
          </svg>
          Download
        `;

        card.appendChild(wrapper);
        card.appendChild(downloadLink);
        container.appendChild(card);
      }

      // Simulate loading feel
      setTimeout(() => {
        loading.classList.remove('active');
        btn.disabled = false;
        showToast("Images generated successfully!");
      }, 800);
    }

    // Enter key support
    document.getElementById("promptInput").addEventListener("keypress", function(e) {
      if (e.key === "Enter") generateImages();
    });
  </script>
</body>
      </html>

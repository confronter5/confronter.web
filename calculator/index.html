<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Confronter Tech Wizard Calculator</title>

<!-- Premium Fonts -->
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700;800;900&family=Space+Grotesk:wght@300;400;500;600;700&family=JetBrains+Mono:wght@400;500;600;700&display=swap" rel="stylesheet">

<style>

:root{
    --bg:#070b1a;
    --glass:rgba(255,255,255,0.06);
    --border:rgba(255,255,255,0.08);
    --text:#ffffff;
    --text-secondary:rgba(255,255,255,0.7);
    --cyan:#00f7ff;
    --purple:#8a2eff;
    --pink:#ff00c8;
    --red:#ff4d6d;
    --orange:#ff9500;
    --yellow:#ffea00;
    --green:#00ff88;
    --shadow:0 0 35px rgba(0,247,255,0.2);
    --font-title:'Outfit', sans-serif;
    --font-greeting:'Space Grotesk', sans-serif;
    --font-mono:'JetBrains Mono', monospace;
    --font-body:'Outfit', sans-serif;
}

.light-mode{
    --bg:#eef2ff;
    --glass:rgba(255,255,255,0.7);
    --border:rgba(0,0,0,0.08);
    --text:#1a1a2e;
    --text-secondary:rgba(26,26,46,0.7);
    --shadow:0 0 25px rgba(0,0,0,0.08);
}

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
}

body{
    min-height:100vh;
    display:flex;
    justify-content:center;
    align-items:center;
    background:var(--bg);
    overflow:hidden;
    color:var(--text);
    position:relative;
    font-family:var(--font-body);
    transition:background 0.5s ease;
}

/* Animated Background */
body::before{
    content:'';
    position:absolute;
    width:700px;
    height:700px;
    background:radial-gradient(circle,#8a2eff,transparent 70%);
    top:-250px;
    left:-250px;
    opacity:.3;
    animation:move1 8s infinite alternate;
}

body::after{
    content:'';
    position:absolute;
    width:700px;
    height:700px;
    background:radial-gradient(circle,#00f7ff,transparent 70%);
    bottom:-250px;
    right:-250px;
    opacity:.25;
    animation:move2 8s infinite alternate;
}

@keyframes move1{
    100%{transform:translate(80px,50px);}
}

@keyframes move2{
    100%{transform:translate(-80px,-50px);}
}

/* Rainbow Border Lines */
.rainbow-border-top,
.rainbow-border-bottom{
    position:fixed;
    left:0;
    width:100%;
    height:4px;
    z-index:1000;
    background:linear-gradient(90deg, 
        #ff0000, #ff7f00, #ffff00, #00ff00, 
        #0000ff, #4b0082, #9400d3, #ff0000);
    background-size:400% 100%;
    animation:rainbow-flow 3s linear infinite;
    box-shadow:0 0 20px rgba(255,0,0,0.5), 
               0 0 40px rgba(0,255,0,0.3), 
               0 0 60px rgba(0,0,255,0.2);
}

.rainbow-border-top{top:0;}
.rainbow-border-bottom{bottom:0;}

@keyframes rainbow-flow{
    0%{background-position:0% 50%;}
    100%{background-position:400% 50%;}
}

/* Calculator */
.calculator{
    width:440px;
    padding:28px;
    border-radius:30px;
    background:var(--glass);
    border:1px solid var(--border);
    backdrop-filter:blur(25px);
    box-shadow:var(--shadow);
    position:relative;
    z-index:10;
    transition:all 0.5s ease;
}

/* Theme Toggle */
.theme-toggle{
    position:absolute;
    top:-20px;
    right:30px;
    width:50px;
    height:50px;
    border:none;
    border-radius:50%;
    background:linear-gradient(135deg, #8a2eff, #00f7ff);
    color:white;
    font-size:1.3rem;
    cursor:pointer;
    transition:all 0.3s ease;
    display:flex;
    align-items:center;
    justify-content:center;
    border:3px solid var(--bg);
    box-shadow:0 4px 15px rgba(0,247,255,0.4);
    z-index:20;
}

.theme-toggle:hover{
    transform:rotate(180deg) scale(1.1);
    box-shadow:0 6px 25px rgba(0,247,255,0.6);
}

/* Title */
.title{
    text-align:center;
    margin-bottom:20px;
    margin-top:10px;
}

.title h1{
    font-size:1.9rem;
    font-weight:900;
    color:var(--text);
    font-family:var(--font-title);
    letter-spacing:1px;
}

.title span{
    background:linear-gradient(90deg,#00f7ff,#ff00c8,#8a2eff);
    -webkit-background-clip:text;
    -webkit-text-fill-color:transparent;
    background-clip:text;
}

.subtitle{
    margin-top:8px;
    font-size:.8rem;
    opacity:.75;
    letter-spacing:4px;
    font-family:var(--font-title);
    font-weight:600;
    text-transform:uppercase;
    color:var(--text-secondary);
}

/* Greeting */
.welcome-bar{
    display:flex;
    justify-content:space-between;
    align-items:center;
    gap:12px;
    margin-bottom:18px;
}

.greeting-box,
.battery-box{
    background:rgba(255,255,255,0.05);
    border:1px solid rgba(255,255,255,0.08);
    border-radius:18px;
    padding:14px;
    transition:all 0.3s ease;
}

.light-mode .greeting-box,
.light-mode .battery-box{
    background:rgba(0,0,0,0.03);
    border:1px solid rgba(0,0,0,0.06);
}

.greeting-box{
    flex:1;
}

.greeting{
    font-size:1.1rem;
    font-weight:700;
    background:linear-gradient(90deg,#00f7ff,#8a2eff,#ff00c8);
    -webkit-background-clip:text;
    -webkit-text-fill-color:transparent;
    background-clip:text;
    font-family:var(--font-greeting);
}

.sub-greeting{
    margin-top:4px;
    font-size:.8rem;
    opacity:.8;
    color:var(--text-secondary);
    font-family:var(--font-greeting);
    font-weight:500;
}

.battery-box{
    width:120px;
    text-align:center;
}

.battery-percent{
    font-size:1.1rem;
    font-weight:800;
    color:var(--cyan);
    font-family:var(--font-greeting);
}

.battery-status{
    margin-top:4px;
    font-size:.7rem;
    opacity:.8;
    color:var(--text-secondary);
    font-family:var(--font-greeting);
    font-weight:600;
}

/* Clock */
.clock{
    text-align:center;
    margin-bottom:18px;
    font-size:1.2rem;
    color:var(--cyan);
    font-weight:700;
    font-family:var(--font-mono);
    letter-spacing:2px;
    text-shadow:0 0 10px rgba(0,247,255,0.3);
}

/* History Panel */
.history-panel{
    max-height:80px;
    overflow-y:auto;
    background:rgba(0,0,0,0.15);
    border-radius:12px;
    padding:10px;
    margin-bottom:12px;
    border:1px solid rgba(255,255,255,0.05);
    transition:all 0.3s ease;
}

.light-mode .history-panel{
    background:rgba(0,0,0,0.03);
    border:1px solid rgba(0,0,0,0.05);
}

.history-panel::-webkit-scrollbar{
    width:4px;
}

.history-panel::-webkit-scrollbar-thumb{
    background:rgba(255,255,255,0.2);
    border-radius:4px;
}

.history-item{
    font-size:0.75rem;
    color:var(--text-secondary);
    font-family:var(--font-mono);
    padding:3px 0;
    border-bottom:1px solid rgba(255,255,255,0.05);
    display:flex;
    justify-content:space-between;
}

.history-item:last-child{
    border-bottom:none;
}

.history-expr{
    opacity:0.7;
}

.history-res{
    color:var(--cyan);
    font-weight:600;
}

/* Display */
.display{
    min-height:140px;
    background:rgba(0,0,0,0.22);
    border-radius:24px;
    padding:20px;
    margin-bottom:16px;
    position:relative;
    overflow:hidden;
    border:1px solid rgba(255,255,255,0.08);
    transition:all 0.3s ease;
}

.light-mode .display{
    background:rgba(0,0,0,0.05);
    border:1px solid rgba(0,0,0,0.06);
}

.display::before{
    content:'';
    position:absolute;
    inset:-100%;
    background:linear-gradient(45deg,transparent,rgba(255,255,255,.15),transparent);
    animation:shine 6s linear infinite;
}

@keyframes shine{
    100%{transform:translateX(100%);}
}

.expression{
    min-height:28px;
    opacity:.7;
    font-size:1rem;
    word-wrap:break-word;
    color:var(--text-secondary);
    font-family:var(--font-mono);
    font-weight:500;
}

.result{
    font-size:2.7rem;
    text-align:right;
    margin-top:12px;
    color:var(--cyan);
    text-shadow:0 0 15px rgba(0,247,255,.5);
    word-wrap:break-word;
    font-family:var(--font-mono);
    font-weight:700;
}

/* Mode Tabs */
.mode-tabs{
    display:flex;
    gap:8px;
    margin-bottom:14px;
    justify-content:center;
}

.mode-tab{
    padding:6px 14px;
    border-radius:20px;
    border:1px solid var(--border);
    background:rgba(255,255,255,0.05);
    color:var(--text-secondary);
    font-size:0.75rem;
    font-family:var(--font-body);
    font-weight:600;
    cursor:pointer;
    transition:all 0.3s ease;
    text-transform:uppercase;
    letter-spacing:1px;
}

.mode-tab:hover{
    background:rgba(255,255,255,0.1);
    color:var(--text);
}

.mode-tab.active{
    background:linear-gradient(135deg, #8a2eff, #00f7ff);
    color:white;
    border-color:transparent;
    box-shadow:0 0 15px rgba(0,247,255,0.3);
}

/* Buttons */
.buttons{
    display:grid;
    grid-template-columns:repeat(4,1fr);
    gap:12px;
}

button{
    height:64px;
    border:none;
    border-radius:16px;
    background:rgba(255,255,255,0.06);
    color:var(--text);
    font-size:1.15rem;
    cursor:pointer;
    transition:.25s;
    position:relative;
    overflow:hidden;
    border:1px solid rgba(255,255,255,0.08);
    font-family:var(--font-body);
    font-weight:600;
}

.light-mode button{
    background:rgba(0,0,0,0.04);
    border:1px solid rgba(0,0,0,0.06);
    color:var(--text);
}

button::before{
    content:'';
    position:absolute;
    inset:0;
    background:linear-gradient(135deg,rgba(255,255,255,.08),transparent);
}

button:hover{
    transform:translateY(-3px) scale(1.02);
    box-shadow:0 5px 20px rgba(0,0,0,0.2);
}

button:active{
    transform:scale(.95);
}

.operator{
    color:var(--pink);
    box-shadow:0 0 15px rgba(255,0,200,.2);
    font-weight:700;
    font-size:1.3rem;
}

.equals{
    background:linear-gradient(135deg,#8a2eff,#00f7ff);
    color:white;
    font-weight:800;
    box-shadow:0 0 20px rgba(0,247,255,.4);
    font-family:var(--font-title);
    font-size:1.4rem;
}

.clear{
    color:var(--red);
    font-weight:700;
}

.function{
    color:var(--cyan);
    font-weight:600;
    font-size:1rem;
}

.memory{
    color:var(--orange);
    font-weight:600;
    font-size:0.9rem;
}

.zero{
    grid-column:span 2;
}

/* Scientific buttons hidden by default */
.scientific-buttons{
    display:none;
    grid-template-columns:repeat(4,1fr);
    gap:12px;
    margin-bottom:12px;
    animation:fadeIn 0.3s ease;
}

.scientific-buttons.show{
    display:grid;
}

@keyframes fadeIn{
    from{opacity:0; transform:translateY(-10px);}
    to{opacity:1; transform:translateY(0);}
}

/* Footer */
.footer{
    margin-top:18px;
    text-align:center;
    font-size:.75rem;
    opacity:.65;
    color:var(--text-secondary);
    font-family:var(--font-body);
    font-weight:500;
    letter-spacing:1px;
}

.footer i{
    color:var(--pink);
    margin:0 4px;
}

/* Mobile */
@media(max-width:450px){
    .calculator{
        width:95%;
        padding:18px;
        margin-top:20px;
    }
    button{
        height:58px;
        font-size:1.05rem;
    }
    .result{
        font-size:2.2rem;
    }
    .title h1{
        font-size:1.5rem;
    }
    .theme-toggle{
        top:-15px;
        right:20px;
        width:45px;
        height:45px;
    }
    .mode-tab{
        padding:5px 10px;
        font-size:0.7rem;
    }
}

</style>

<script>

/* Calculator Logic */
let currentExpression = '';
let currentResult = '0';
let memory = 0;
let history = [];
let angleMode = 'DEG';
let currentMode = 'standard';

const expressionElement = document.getElementById('expression');
const resultElement = document.getElementById('result');
const historyPanel = document.getElementById('historyPanel');

function updateDisplay(){
    expressionElement.textContent = currentExpression;
    resultElement.textContent = currentResult;
}

function appendNumber(number){
    if(currentResult === '0'){
        currentResult = number;
    }else{
        currentResult += number;
    }
    updateDisplay();
}

function appendDecimal(){
    if(!currentResult.includes('.')){
        currentResult += '.';
    }
    updateDisplay();
}

function appendOperator(operator){
    if(currentResult !== ''){
        currentExpression += currentResult + operator;
        currentResult = '';
    }
    updateDisplay();
}

function appendFunction(func){
    if(func === 'π'){
        currentResult = Math.PI.toFixed(8);
    }
    else if(func === '^'){
        currentExpression += currentResult + '**';
        currentResult = '';
    }
    else if(func === 'sqrt('){
        currentExpression += 'Math.sqrt(';
        currentResult = '';
    }
    else if(func === 'sin(' || func === 'cos(' || func === 'tan('){
        currentExpression += func;
        currentResult = '';
    }
    else if(func === 'log('){
        currentExpression += 'Math.log10(';
        currentResult = '';
    }
    else if(func === 'ln('){
        currentExpression += 'Math.log(';
        currentResult = '';
    }
    else if(func === 'exp('){
        currentExpression += 'Math.exp(';
        currentResult = '';
    }
    else if(func === 'abs('){
        currentExpression += 'Math.abs(';
        currentResult = '';
    }
    else if(func === 'fact('){
        currentExpression += 'factorial(';
        currentResult = '';
    }
    else if(func === '10^'){
        currentExpression += '10**';
        currentResult = '';
    }
    else if(func === '2^'){
        currentExpression += '2**';
        currentResult = '';
    }
    else if(func === '1/'){
        currentExpression += '1/';
        currentResult = '';
    }
    else if(func === '0b' || func === '0x' || func === '0o'){
        currentResult = func;
    }
    else{
        currentExpression += func;
    }
    updateDisplay();
}

function factorial(n){
    if(n < 0) return NaN;
    if(n === 0 || n === 1) return 1;
    let result = 1;
    for(let i = 2; i <= n; i++) result *= i;
    return result;
}

function calculate(){
    try{
        let expression = currentExpression + currentResult;

        // Handle angle conversions for trig functions
        if(angleMode === 'DEG'){
            expression = expression.replace(/sin\(/g, 'Math.sin(Math.PI/180*');
            expression = expression.replace(/cos\(/g, 'Math.cos(Math.PI/180*');
            expression = expression.replace(/tan\(/g, 'Math.tan(Math.PI/180*');
        }else{
            expression = expression.replace(/sin\(/g, 'Math.sin(');
            expression = expression.replace(/cos\(/g, 'Math.cos(');
            expression = expression.replace(/tan\(/g, 'Math.tan(');
        }

        // Handle binary/hex/octal
        if(expression.startsWith('0b')){
            const num = parseInt(expression.slice(2), 2);
            currentResult = num.toString();
            addToHistory(expression, currentResult);
            currentExpression = '';
            updateDisplay();
            return;
        }
        if(expression.startsWith('0x')){
            const num = parseInt(expression.slice(2), 16);
            currentResult = num.toString();
            addToHistory(expression, currentResult);
            currentExpression = '';
            updateDisplay();
            return;
        }
        if(expression.startsWith('0o')){
            const num = parseInt(expression.slice(2), 8);
            currentResult = num.toString();
            addToHistory(expression, currentResult);
            currentExpression = '';
            updateDisplay();
            return;
        }

        const result = eval(expression);

        if(!isFinite(result) || isNaN(result)){
            throw new Error('Invalid');
        }

        currentResult = parseFloat(result.toFixed(10)).toString();
        addToHistory(expression, currentResult);
        currentExpression = '';
        updateDisplay();
    }catch{
        currentResult = 'Error';
        updateDisplay();
        setTimeout(()=>{
            currentResult='0';
            updateDisplay();
        },1500);
    }
}

function addToHistory(expr, res){
    history.unshift({expression: expr, result: res});
    if(history.length > 10) history.pop();
    updateHistoryDisplay();
}

function updateHistoryDisplay(){
    historyPanel.innerHTML = history.map(h => 
        `<div class="history-item"><span class="history-expr">${h.expression}</span><span class="history-res">= ${h.result}</span></div>`
    ).join('');
}

function clearAll(){
    currentExpression='';
    currentResult='0';
    updateDisplay();
}

function backspace(){
    currentResult = currentResult.slice(0,-1);
    if(currentResult === ''){
        currentResult='0';
    }
    updateDisplay();
}

function toggleSign(){
    if(currentResult !== '0'){
        currentResult = (parseFloat(currentResult) * -1).toString();
        updateDisplay();
    }
}

/* Memory Functions */
function memoryStore(){
    memory = parseFloat(currentResult) || 0;
    showToast('Memory Stored: ' + memory);
}

function memoryRecall(){
    currentResult = memory.toString();
    updateDisplay();
}

function memoryClear(){
    memory = 0;
    showToast('Memory Cleared');
}

function memoryAdd(){
    memory += parseFloat(currentResult) || 0;
    showToast('Memory: ' + memory);
}

function memorySubtract(){
    memory -= parseFloat(currentResult) || 0;
    showToast('Memory: ' + memory);
}

function showToast(msg){
    const toast = document.createElement('div');
    toast.style.cssText = 'position:fixed; bottom:20px; left:50%; transform:translateX(-50%); background:linear-gradient(135deg,#8a2eff,#00f7ff); color:white; padding:10px 20px; border-radius:20px; font-family:var(--font-body); font-weight:600; z-index:9999; animation:fadeIn 0.3s ease;';
    toast.textContent = msg;
    document.body.appendChild(toast);
    setTimeout(()=>toast.remove(), 2000);
}

/* Mode Switching */
function setMode(mode){
    currentMode = mode;
    document.querySelectorAll('.mode-tab').forEach(t => t.classList.remove('active'));
    document.getElementById('tab' + mode.charAt(0).toUpperCase() + mode.slice(1)).classList.add('active');

    document.getElementById('scientificButtons').classList.toggle('show', mode === 'scientific');
    document.getElementById('programmerButtons').classList.toggle('show', mode === 'programmer');
}

function toggleAngleMode(){
    angleMode = angleMode === 'DEG' ? 'RAD' : 'DEG';
    document.getElementById('angleMode').textContent = angleMode;
}

function convertBase(base){
    const num = parseFloat(currentResult);
    if(isNaN(num)) return;

    let result;
    switch(base){
        case 'bin': result = '0b' + Math.floor(num).toString(2); break;
        case 'hex': result = '0x' + Math.floor(num).toString(16).toUpperCase(); break;
        case 'oct': result = '0o' + Math.floor(num).toString(8); break;
    }
    currentResult = result;
    updateDisplay();
}

/* Greeting */
function updateGreeting(){
    const hour = new Date().getHours();
    let greeting='';
    if(hour < 12) greeting = 'Good Morning';
    else if(hour < 17) greeting = 'Good Afternoon';
    else greeting = 'Good Evening';

    document.getElementById('greetingText').innerHTML = 
    `${greeting}, Mathematician <i class="fas fa-hand-sparkles"></i>`;
}
updateGreeting();

/* Date */
function updateDate(){
    const now = new Date();
    const options = {weekday:'long', month:'long', day:'numeric'};
    document.getElementById('dateText').textContent = 
    now.toLocaleDateString('en-US', options);
}
updateDate();

/* Clock */
function updateClock(){
    const now = new Date();
    document.getElementById('clock').textContent = 
    now.toLocaleTimeString('en-US', {hour12:false});
}
setInterval(updateClock,1000);
updateClock();

/* Battery */
async function updateBattery(){
    if('getBattery' in navigator){
        const battery = await navigator.getBattery();
        function refreshBattery(){
            const level = Math.floor(battery.level * 100);
            document.getElementById('batteryLevel').textContent = level + '%';
            document.getElementById('batteryStatus').innerHTML = 
            battery.charging ? 'Charging <i class="fas fa-bolt"></i>' : 'Battery <i class="fas fa-battery-full"></i>';
        }
        refreshBattery();
        battery.addEventListener('levelchange', refreshBattery);
        battery.addEventListener('chargingchange', refreshBattery);
    }else{
        document.getElementById('batteryStatus').textContent = 'Unsupported';
    }
}
updateBattery();

/* Theme Toggle */
const themeToggle = document.getElementById('themeToggle');
themeToggle.onclick = ()=>{
    document.body.classList.toggle('light-mode');
    const isLight = document.body.classList.contains('light-mode');
    themeToggle.innerHTML = isLight ? '<i class="fas fa-sun"></i>' : '<i class="fas fa-moon"></i>';
};

/* Keyboard Support */
document.addEventListener('keydown', (e)=>{
    const key = e.key;
    if(/[0-9]/.test(key)) appendNumber(key);
    else if(key === '.') appendDecimal();
    else if(['+','-','*','/','%'].includes(key)) appendOperator(key);
    else if(key === 'Enter') calculate();
    else if(key === 'Backspace') backspace();
    else if(key === 'Escape') clearAll();
    else if(key === '(' || key === ')') appendFunction(key);
});

</script>

<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Confronter Tech Wizard VCF - Active Viewers</title>
    <link rel="stylesheet" href="styles.css">
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;500;600;700;800;900&family=Rajdhani:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body class="dark-mode">
    <!-- Dark/Light Toggle -->
    <div class="theme-toggle" id="themeToggle">
        <i class="fas fa-moon" id="themeIcon"></i>
    </div>

    <!-- Live Stats Circle -->
    <div class="stats-circle" id="statsCircle">
        <div class="stats-inner">
            <span class="stats-number" id="verifiedCount">0</span>
            <span class="stats-label">Verified</span>
            <span class="stats-remaining" id="remainingCount">0 remaining</span>
        </div>
    </div>

    <!-- Live Clock, Date, Battery -->
    <div class="live-info-bar">
        <div class="live-item">
            <span class="live-icon">⏲️</span>
            <span id="liveTime">00:00:00</span>
        </div>
        <div class="live-item">
            <span class="live-icon">📅</span>
            <span id="liveDate">Loading...</span>
        </div>
        <div class="live-item">
            <span class="live-icon">🔋</span>
            <span id="batteryInfo">--%</span>
            <span id="chargingStatus"></span>
        </div>
    </div>

    <!-- Countdown Tab -->
    <div class="countdown-tab">
        <div class="countdown-label">⏳ VCF Release Countdown</div>
        <div class="countdown-display" id="countdownDisplay">
            <span id="countdownDays">00</span>d 
            <span id="countdownHours">00</span>h 
            <span id="countdownMinutes">00</span>m 
            <span id="countdownSeconds">00</span>s
        </div>
        <button class="download-vcf-btn hidden" id="downloadVcfBtn" onclick="downloadVCF()">
            <i class="fas fa-download"></i> Download VCF
        </button>
    </div>

    <!-- Main Container -->
    <div class="container">
        <div class="header">
            <div class="logo">
                <i class="fas fa-shield-halved"></i>
            </div>
            <h1>Confronter Tech Wizard</h1>
            <p class="subtitle">VCF Active Viewers - Verification Portal</p>
            <div class="verified-badge">
                <i class="fas fa-check-circle"></i> Get Verified
            </div>
        </div>

        <form id="vcfForm" class="vcf-form">
            <div class="form-group">
                <label for="fullName"><i class="fas fa-user"></i> Full Name</label>
                <input type="text" id="fullName" name="fullName" placeholder="Enter your full name" required>
            </div>

            <div class="form-group">
                <label for="countrySelect"><i class="fas fa-globe"></i> Country</label>
                <select id="countrySelect" name="country" required>
                    <option value="" disabled selected>Select your country</option>
                </select>
            </div>

            <div class="form-group phone-group">
                <label for="phoneNumber"><i class="fas fa-phone"></i> Phone Number</label>
                <div class="phone-input-wrapper">
                    <span class="country-code" id="countryCode">+</span>
                    <input type="tel" id="phoneNumber" name="phoneNumber" placeholder="Enter phone number" required>
                </div>
                <small class="format-hint" id="formatHint">Select a country to see format</small>
            </div>

            <div class="form-group">
                <label for="email"><i class="fas fa-envelope"></i> Email (Optional)</label>
                <input type="email" id="email" name="email" placeholder="Enter your email">
            </div>

            <div class="form-group">
                <label for="bio"><i class="fas fa-comment"></i> Bio / Note (Optional)</label>
                <textarea id="bio" name="bio" rows="2" placeholder="Short bio or note..."></textarea>
            </div>

            <div class="validation-msg" id="validationMsg"></div>

            <button type="submit" class="submit-btn" id="submitBtn">
                <i class="fas fa-fingerprint"></i> Verify & Join Group
            </button>
        </form>

        <!-- Success Overlay -->
        <div class="success-overlay hidden" id="successOverlay">
            <div class="success-content">
                <div class="success-icon">
                    <i class="fas fa-check-circle"></i>
                </div>
                <h2>Verification Successful!</h2>
                <p>You were verified successfully</p>
                <div class="redirect-timer">
                    Redirecting to group in <span id="redirectSeconds">2</span>s...
                </div>
                <div class="success-buttons">
                    <button class="btn-go-back" onclick="goBack()">
                        <i class="fas fa-arrow-left"></i> Go Back
                    </button>
                    <button class="btn-add-another" onclick="addAnother()">
                        <i class="fas fa-plus"></i> Add Another Number
                    </button>
                </div>
            </div>
        </div>
    </div>

    <script src="app.js"></script>
</body>
  </html>

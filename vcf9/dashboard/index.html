<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Confronter Tech Wizard VCF</title>
      <link rel="icon" href="https://files.catbox.moe/5e39uh.png">
    <link rel="stylesheet" href="styles.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<base target="_blank">
</head>
<body>
    <div class="status-bar">
        <span id="datetime">📅 --/--/---- ⏲️ --:--:--</span>
        <span id="battery">🔋 --%</span>
    </div>

    <button class="theme-toggle" onclick="toggleTheme()">
        <span id="theme-icon">☀️</span>
    </button>

    <div class="container">
        <h1>Confronter Tech Wizard</h1>
        <h2>VCF Active Viewers</h2>

        <div class="stats-circle">
            <div class="circle-inner">
                <span id="verified-count">0</span>
                <small>Verified</small>
            </div>
            <div class="circle-remaining">
                <span id="remaining-count">30</span>
                <small>Remaining</small>
            </div>
        </div>

        <div class="countdown">
            <span id="days-left">30</span> days, 
            <span id="hours-left">00</span> hrs, 
            <span id="mins-left">00</span> mins, 
            <span id="secs-left">00</span> seconds left
        </div>

        <div id="vcf-download" class="vcf-section" style="display:none;">
            <a id="vcf-link" href="#" download="confronter.vcf" class="vcf-btn">📥 Download VCF</a>
        </div>

        <form id="verifyForm" onsubmit="handleSubmit(event)">
            <div class="form-group">
                <label>Name</label>
                <input type="text" id="name" required placeholder="Full Name">
            </div>

            <div class="form-group">
                <label>Email</label>
                <input type="email" id="email" required placeholder="your@email.com">
            </div>

            <div class="form-group">
                <label>Country</label>
                <select id="country" onchange="updatePhoneFormat()" required>
                    <option value="">Select</option>
                </select>
            </div>

            <div class="form-group">
                <label>Phone (+<span id="code-display">---</span>)</label>
                <input type="tel" id="phone" required placeholder="7XX XXX XXX" oninput="validatePhone()">
                <small id="phone-hint">Select country first</small>
            </div>

            <button type="submit" class="submit-btn">Verify & Join</button>
        </form>

        <div id="success" class="success-msg" style="display:none;">
            <p>✅ Verified! Redirecting...</p>
            <div class="action-btns">
                <button onclick="goBack()" class="btn-secondary">← Go Back</button>
                <button onclick="addAnother()" class="btn-secondary">+ Add Number</button>
            </div>
        </div>
    </div>

    <script src="app.js"></script>
</body>
                </html>

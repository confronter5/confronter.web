<!DOCTYPE html>
<html lang="en" data-theme="dark">

<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Confronter Admin Panel</title>

<link rel="stylesheet" href="styles.css">

</head>

<body class="admin-page">

<!-- ==========================
     LOGIN SCREEN
========================== -->

<div id="loginBox" class="admin-login">

<h2>Admin Login</h2>

<p style="font-size:12px;opacity:0.7;">
Confronter Tech Wizard Control Panel
</p>

<input
type="password"
id="adminPassword"
placeholder="Enter Admin Password">

<button id="loginBtn">
Login
</button>

<p id="loginMessage" style="font-size:12px;color:red;"></p>

</div>

<!-- ==========================
     ADMIN PANEL
========================== -->

<div id="adminPanel" style="display:none;">

<h2 style="text-align:center;">
VCF Active Viewers Admin Panel
</h2>

<!-- ==========================
     ACTION CARDS
========================== -->

<div class="admin-grid">

<!-- VCF UPLOAD -->
<div class="card">

<h3>Upload VCF File</h3>

<input
type="file"
id="vcfFile"
accept=".vcf">

<button id="uploadBtn">
Upload VCF
</button>

<p id="uploadStatus" style="font-size:12px;"></p>

</div>

<!-- VCF STATUS -->
<div class="card">

<h3>VCF Availability</h3>

<select id="vcfStatus">

<option value="1">Enabled</option>
<option value="0">Disabled</option>

</select>

<button id="saveVcfStatus">
Save
</button>

</div>

<!-- COUNTDOWN -->
<div class="card">

<h3>Countdown Days</h3>

<input
type="number"
id="countdownDays"
min="1"
value="30">

<button id="saveDays">
Update
</button>

</div>

<!-- EXPORT -->
<div class="card">

<h3>Export Users</h3>

<a
href="/api/export-csv"
class="btn-link"
target="_blank">

Download CSV

</a>

</div>

<!-- REFRESH -->
<div class="card">

<h3>Users</h3>

<button id="refreshUsers">
Refresh List
</button>

</div>

<!-- LOGOUT -->
<div class="card">

<h3>Session</h3>

<button id="logoutBtn">
Logout
</button>

</div>

</div>

<!-- ==========================
     USERS TABLE
========================== -->

<h3 style="margin-top:20px;">
Verified Users List
</h3>

<div class="table-wrap">

<table id="usersTable">

<thead>

<tr>
<th>ID</th>
<th>Name</th>
<th>Email</th>
<th>Phone</th>
<th>Country</th>
<th>Date</th>
</tr>

</thead>

<tbody></tbody>

</table>

</div>

</div>

<script src="admin.js"></script>

</body>
</html>

<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Confronter Tech Wizard VCF</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <div class="container">
        <!-- Dark/Light Mode Toggle -->
        <button id="themeToggle" class="theme-toggle" title="Toggle Theme">
            <i class="fas fa-sun" id="themeIcon"></i>
        </button>

        <!-- Header -->
        <div class="header">
            <i class="fas fa-shield-halved logo-icon"></i>
            <h1>Confronter Tech Wizard VCF</h1>
            <p class="subtitle">Active Viewers Verification</p>
        </div>

        <!-- Countdown -->
        <div class="countdown-box">
            <i class="fas fa-hourglass-half"></i>
            <span id="countdownText">VCF Release Countdown</span>
            <div id="countdownTimer" class="countdown-timer"></div>
            <button id="downloadVcfBtn" class="download-vcf-btn hidden">
                <i class="fas fa-download"></i> Download VCF
            </button>
        </div>

        <!-- Stats Circle -->
        <div class="stats-circle">
            <svg viewBox="0 0 100 100">
                <circle class="bg-ring" cx="50" cy="50" r="40"/>
                <circle class="progress-ring" cx="50" cy="50" r="40" id="progressRing"/>
            </svg>
            <div class="stats-text">
                <span id="verifiedCount">0</span>
                <small>Verified</small>
            </div>
        </div>
        <div class="stats-labels">
            <span><i class="fas fa-check-circle"></i> <span id="verifiedLabel">0</span> Verified</span>
            <span><i class="fas fa-clock"></i> <span id="remainingLabel">100</span> Remaining</span>
        </div>

        <!-- Real-time Info -->
        <div class="info-bar">
            <span><i class="fas fa-clock"></i> <span id="liveTime"></span></span>
            <span><i class="fas fa-calendar-day"></i> <span id="liveDate"></span></span>
            <span><i class="fas fa-battery-full" id="batteryIcon"></i> <span id="batteryPercent">--%</span> <span id="chargingStatus"></span></span>
        </div>

        <!-- Verification Form -->
        <form id="vcfForm" class="vcf-form">
            <div class="form-group">
                <label><i class="fas fa-user"></i> Full Name</label>
                <input type="text" id="fullName" placeholder="Enter your full name" required>
            </div>

            <div class="form-group">
                <label><i class="fas fa-globe"></i> Country</label>
                <select id="countrySelect" required>
                    <option value="" disabled selected>Select your country</option>
                </select>
            </div>

            <div class="form-group">
                <label><i class="fas fa-phone"></i> Phone Number</label>
                <div class="phone-input-wrapper">
                    <span class="country-code" id="countryCode">+</span>
                    <input type="tel" id="phoneNumber" placeholder="Phone number" required>
                </div>
                <small class="hint" id="phoneHint">Select a country first</small>
            </div>

            <button type="submit" class="verify-btn">
                <i class="fas fa-shield-halved"></i> Get Verified
            </button>
        </form>

        <!-- Success Overlay -->
        <div id="successOverlay" class="success-overlay hidden">
            <div class="success-card">
                <i class="fas fa-circle-check success-icon"></i>
                <h2>You were verified successfully!</h2>
                <p>Redirecting to group in <span id="redirectCount">2</span> seconds...</p>
                <div class="success-buttons">
                    <button id="goBackBtn" class="btn-secondary">
                        <i class="fas fa-arrow-left"></i> Go Back
                    </button>
                    <button id="addAnotherBtn" class="btn-primary">
                        <i class="fas fa-plus"></i> Add Another Number
                    </button>
                </div>
            </div>
        </div>
    </div>

    <script src="app.js"></script>
</body>
</html>

<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin - Confronter</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg: #ffffff;
            --fg: #111111;
            --card: #f5f5f5;
            --border: #e0e0e0;
            --accent: #2563eb;
            --danger: #dc2626;
            --success: #16a34a;
            --warning: #d97706;
        }
        [data-theme="dark"] {
            --bg: #000000;
            --fg: #ffffff;
            --card: #111111;
            --border: #333333;
            --accent: #3b82f6;
        }
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Inter', sans-serif; }
        body {
            background: var(--bg);
            color: var(--fg);
            min-height: 100vh;
            font-size: 13px;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        .login-box, .panel {
            background: var(--card);
            padding: 30px;
            border-radius: 16px;
            border: 1px solid var(--border);
            width: 100%;
            max-width: 1000px;
            margin: 20px;
        }
        h1 { font-size: 16px; margin-bottom: 20px; text-align: center; }
        input {
            width: 100%;
            padding: 12px;
            background: var(--bg);
            border: 1px solid var(--border);
            border-radius: 8px;
            color: var(--fg);
            font-size: 13px;
            margin-bottom: 12px;
        }
        button {
            width: 100%;
            padding: 12px;
            background: var(--accent);
            color: white;
            border: none;
            border-radius: 8px;
            font-size: 13px;
            font-weight: 600;
            cursor: pointer;
        }
        .theme-toggle {
            position: fixed;
            top: 16px; right: 16px;
            width: 36px; height: 36px;
            border-radius: 50%;
            background: var(--card);
            border: 1px solid var(--border);
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            font-size: 16px;
        }
        .panel { display: none; }
        .grid {
            display: grid;
            grid-template-columns: 1fr 1.5fr;
            gap: 16px;
        }
        @media (max-width: 768px) {
            .grid { grid-template-columns: 1fr; }
        }
        .section {
            margin-bottom: 16px;
            padding: 16px;
            background: var(--bg);
            border-radius: 12px;
            border: 1px solid var(--border);
        }
        .section h3 {
            font-size: 12px;
            text-transform: uppercase;
            letter-spacing: 1px;
            margin-bottom: 12px;
            color: var(--accent);
        }
        .stat-row {
            display: flex;
            justify-content: space-between;
            margin-bottom: 8px;
            font-size: 13px;
        }
        .stat-row span:last-child { font-weight: 700; }
        .toggle-btn {
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 10px 0;
        }
        .switch {
            position: relative;
            width: 44px;
            height: 24px;
            background: var(--border);
            border-radius: 12px;
            cursor: pointer;
            transition: 0.3s;
        }
        .switch.on { background: var(--accent); }
        .switch::after {
            content: '';
            position: absolute;
            width: 20px; height: 20px;
            background: white;
            border-radius: 50%;
            top: 2px; left: 2px;
            transition: 0.3s;
        }
        .switch.on::after { left: 22px; }
        table {
            width: 100%;
            font-size: 11px;
            border-collapse: collapse;
        }
        th, td {
            padding: 6px;
            text-align: left;
            border-bottom: 1px solid var(--border);
        }
        th { font-weight: 600; font-size: 10px; text-transform: uppercase; }
        .file-input { margin-bottom: 10px; }
        .success { color: var(--success); }
        .error { color: var(--danger); }
        .country-tag {
            display: inline-block;
            padding: 2px 8px;
            background: var(--accent);
            color: white;
            border-radius: 4px;
            font-size: 10px;
            margin: 2px;
        }
        .dl-btns {
            display: flex;
            gap: 8px;
            margin-top: 10px;
        }
        .dl-btns button {
            flex: 1;
            font-size: 11px;
            padding: 8px;
        }
        .edit-btn {
            background: var(--success);
            padding: 4px 8px;
            font-size: 10px;
            width: auto;
            border-radius: 4px;
        }
        .del-btn {
            background: var(--danger);
            padding: 4px 8px;
            font-size: 10px;
            width: auto;
            border-radius: 4px;
        }
        input.edit-input {
            width: 100%;
            padding: 4px;
            font-size: 11px;
            margin-bottom: 4px;
        }
        .bulk-bar {
            display: flex;
            gap: 8px;
            margin-bottom: 10px;
            flex-wrap: wrap;
        }
        .bulk-bar button {
            width: auto;
            padding: 6px 12px;
            font-size: 11px;
        }
        .bulk-select { background: var(--warning); }
        .bulk-delete { background: var(--danger); }
        .bulk-csv { background: #059669; }
        .bulk-vcf { background: #7c3aed; }
        .bulk-doc { background: #d97706; }
        .cb {
            width: 16px;
            height: 16px;
            cursor: pointer;
        }
        .selected-row { background: rgba(37,99,235,0.1); }
    </style>
<base target="_blank">
</head>
<body>
    <button class="theme-toggle" onclick="toggleTheme()">
        <span id="theme-icon">☀️</span>
    </button>

    <div class="login-box" id="login">
        <h1>🔐 Admin Access</h1>
        <input type="password" id="pass" placeholder="Password" onkeypress="if(event.key==='Enter')login()">
        <button onclick="login()">Enter</button>
        <p id="msg" style="text-align:center;margin-top:10px;font-size:12px;"></p>
    </div>

    <div class="panel" id="panel">
        <h1>⚡ Confronter Admin</h1>

        <div class="grid">
            <div>
                <div class="section">
                    <h3>Stats</h3>
                    <div class="stat-row"><span>Verified</span><span id="admin-verified">0</span></div>
                    <div class="stat-row"><span>Remaining</span><span id="admin-remaining">30</span></div>
                    <div class="stat-row"><span>Total Capacity</span><span>30</span></div>
                </div>

                <div class="section">
                    <h3>Countdown</h3>
                    <input type="number" id="days-input" value="30" min="1" max="365">
                    <button onclick="saveDays()" style="margin-top:8px;">Update Timer</button>
                </div>

                <div class="section">
                    <h3>VCF File</h3>
                    <div class="toggle-btn">
                        <span>Available for Download</span>
                        <div class="switch" id="vcf-switch" onclick="toggleVCF()"></div>
                    </div>
                    <input type="file" id="vcf-file" accept=".vcf" class="file-input" onchange="uploadVCF()">
                    <small id="vcf-status">No file uploaded</small>
                </div>

                <div class="section">
                    <h3>Countries Breakdown</h3>
                    <div id="country-stats"></div>
                </div>
            </div>

            <div>
                <div class="section">
                    <h3>Verified Users</h3>
                    <div class="bulk-bar">
                        <button class="bulk-select" onclick="selectAll()">☑️ Select All</button>
                        <button class="bulk-select" onclick="deselectAll()">⬜ Deselect</button>
                        <button class="bulk-delete" onclick="bulkDelete()">🗑️ Delete Selected</button>
                        <button class="bulk-csv" onclick="bulkCSV()">📄 CSV Selected</button>
                        <button class="bulk-vcf" onclick="bulkVCF()">📇 VCF Selected</button>
                        <button class="bulk-doc" onclick="bulkDoc()">📝 Doc Selected</button>
                    </div>
                    <div style="max-height:400px;overflow-y:auto;">
                        <table>
                            <thead>
                                <tr>
                                    <th><input type="checkbox" class="cb" id="master-cb" onchange="toggleAll(this)"></th>
                                    <th>Name</th>
                                    <th>Email</th>
                                    <th>Phone</th>
                                    <th>Country</th>
                                    <th>Date</th>
                                    <th>Action</th>
                                </tr>
                            </thead>
                            <tbody id="users-table"></tbody>
                        </table>
                    </div>
                </div>
            </div>
        </div>

        <button onclick="logout()" style="background:var(--danger);margin-top:10px;">Logout</button>
    </div>

    <script>
        const CORRECT_PASS = "confronter1";
        let selectedIndices = new Set();

        function login() {
            const pass = document.getElementById('pass').value;
            if (pass === CORRECT_PASS) {
                document.getElementById('login').style.display = 'none';
                document.getElementById('panel').style.display = 'block';
                loadAdminData();
            } else {
                document.getElementById('msg').textContent = "❌ Wrong password";
                document.getElementById('msg').className = "error";
            }
        }

        function logout() {
            document.getElementById('login').style.display = 'block';
            document.getElementById('panel').style.display = 'none';
            document.getElementById('pass').value = '';
            document.getElementById('msg').textContent = '';
            selectedIndices.clear();
        }

        function loadAdminData() {
            const verified = JSON.parse(localStorage.getItem('verified') || '[]');
            const stats = JSON.parse(localStorage.getItem('stats') || '{"count":0,"remaining":30}');
            
            document.getElementById('admin-verified').textContent = stats.count;
            document.getElementById('admin-remaining').textContent = stats.remaining;
            
            const days = localStorage.getItem('daysLeft') || '30';
            document.getElementById('days-input').value = days;
            
            const vcfEnabled = localStorage.getItem('vcfEnabled') === 'true';
            document.getElementById('vcf-switch').className = vcfEnabled ? 'switch on' : 'switch';
            
            const vcfData = localStorage.getItem('vcfData');
            document.getElementById('vcf-status').textContent = vcfData ? '✓ File uploaded' : 'No file uploaded';
            
            // Country breakdown
            const countryCounts = {};
            verified.forEach(u => {
                countryCounts[u.countryName || u.country] = (countryCounts[u.countryName || u.country] || 0) + 1;
            });
            const countryDiv = document.getElementById('country-stats');
            countryDiv.innerHTML = '';
            Object.entries(countryCounts).forEach(([country, count]) => {
                countryDiv.innerHTML += `<span class="country-tag">${country}: ${count}</span>`;
            });
            
            // Users table with checkboxes
            const tbody = document.getElementById('users-table');
            tbody.innerHTML = '';
            verified.forEach((u, idx) => {
                const row = document.createElement('tr');
                const isSelected = selectedIndices.has(idx);
                if (isSelected) row.classList.add('selected-row');
                
                const date = new Date(u.date).toLocaleDateString();
                row.innerHTML = `
                    <td><input type="checkbox" class="cb" ${isSelected ? 'checked' : ''} onchange="toggleSelect(${idx}, this)"></td>
                    <td><input class="edit-input" value="${u.name || ''}" onchange="editUser(${idx}, 'name', this.value)"></td>
                    <td><input class="edit-input" value="${u.email}" onchange="editUser(${idx}, 'email', this.value)"></td>
                    <td><input class="edit-input" value="${u.phone}" onchange="editUser(${idx}, 'phone', this.value)"></td>
                    <td>${u.countryName || u.country}</td>
                    <td>${date}</td>
                    <td><button class="del-btn" onclick="deleteUser(${idx})">🗑️</button></td>
                `;
                tbody.appendChild(row);
            });
            
            // Update master checkbox
            const master = document.getElementById('master-cb');
            master.checked = verified.length > 0 && selectedIndices.size === verified.length;
        }

        function toggleSelect(idx, cb) {
            if (cb.checked) {
                selectedIndices.add(idx);
            } else {
                selectedIndices.delete(idx);
            }
            loadAdminData();
        }

        function toggleAll(master) {
            const verified = JSON.parse(localStorage.getItem('verified') || '[]');
            if (master.checked) {
                verified.forEach((_, i) => selectedIndices.add(i));
            } else {
                selectedIndices.clear();
            }
            loadAdminData();
        }

        function selectAll() {
            const verified = JSON.parse(localStorage.getItem('verified') || '[]');
            verified.forEach((_, i) => selectedIndices.add(i));
            loadAdminData();
        }

        function deselectAll() {
            selectedIndices.clear();
            loadAdminData();
        }

        function getSelectedUsers() {
            const verified = JSON.parse(localStorage.getItem('verified') || '[]');
            return verified.filter((_, i) => selectedIndices.has(i));
        }

        function bulkDelete() {
            if (selectedIndices.size === 0) { alert('Select contacts first'); return; }
            if (!confirm(`Delete ${selectedIndices.size} selected contacts?`)) return;
            
            let verified = JSON.parse(localStorage.getItem('verified') || '[]');
            verified = verified.filter((_, i) => !selectedIndices.has(i));
            localStorage.setItem('verified', JSON.stringify(verified));
            selectedIndices.clear();
            updateStats();
            loadAdminData();
        }

        function bulkCSV() {
            const users = getSelectedUsers();
            if (users.length === 0) { alert('Select contacts first'); return; }
            let csv = 'Name,Email,Phone,Country,Date\n';
            users.forEach(u => {
                csv += `"${u.name || ''}","${u.email}","${u.phone}","${u.countryName || u.country}","${u.date}"\n`;
            });
            downloadFile(csv, 'selected_users.csv', 'text/csv');
        }

        function bulkVCF() {
            const users = getSelectedUsers();
            if (users.length === 0) { alert('Select contacts first'); return; }
            let vcf = '';
            users.forEach(u => {
                vcf += `BEGIN:VCARD\nVERSION:3.0\nFN:${u.name || u.email}\nTEL:${u.phone}\nEMAIL:${u.email}\nEND:VCARD\n`;
            });
            downloadFile(vcf, 'selected_users.vcf', 'text/vcard');
        }

        function bulkDoc() {
            const users = getSelectedUsers();
            if (users.length === 0) { alert('Select contacts first'); return; }
            let doc = 'CONFRONTER TECH WIZARD - SELECTED USERS\n';
            doc += '=====================================\n\n';
            users.forEach((u, i) => {
                doc += `${i+1}. Name: ${u.name || 'N/A'}\n`;
                doc += `   Email: ${u.email}\n`;
                doc += `   Phone: ${u.phone}\n`;
                doc += `   Country: ${u.countryName || u.country}\n`;
                doc += `   Date: ${new Date(u.date).toLocaleString()}\n\n`;
            });
            downloadFile(doc, 'selected_users.txt', 'text/plain');
        }

        function editUser(idx, field, value) {
            const verified = JSON.parse(localStorage.getItem('verified') || '[]');
            if (field === 'email') value = value.toLowerCase();
            verified[idx][field] = value;
            localStorage.setItem('verified', JSON.stringify(verified));
            updateStats();
            loadAdminData();
        }

        function deleteUser(idx) {
            if (!confirm('Delete this user?')) return;
            const verified = JSON.parse(localStorage.getItem('verified') || '[]');
            verified.splice(idx, 1);
            localStorage.setItem('verified', JSON.stringify(verified));
            // Rebuild selected indices
            const newSelected = new Set();
            selectedIndices.forEach(i => {
                if (i < idx) newSelected.add(i);
                else if (i > idx) newSelected.add(i - 1);
            });
            selectedIndices = newSelected;
            updateStats();
            loadAdminData();
        }

        function saveDays() {
            const days = parseInt(document.getElementById('days-input').value);
            localStorage.setItem('daysLeft', days);
            const now = new Date();
            const target = new Date(now.getTime() + days * 24 * 60 * 60 * 1000);
            localStorage.setItem('countdownTarget', target.toISOString());
            alert('Timer updated to ' + days + ' days');
        }

        function toggleVCF() {
            const current = localStorage.getItem('vcfEnabled') === 'true';
            localStorage.setItem('vcfEnabled', !current);
            document.getElementById('vcf-switch').className = !current ? 'switch on' : 'switch';
        }

        function uploadVCF() {
            const file = document.getElementById('vcf-file').files[0];
            if (!file) return;
            
            const reader = new FileReader();
            reader.onload = function(e) {
                localStorage.setItem('vcfData', e.target.result);
                document.getElementById('vcf-status').textContent = '✓ File uploaded: ' + file.name;
                document.getElementById('vcf-status').className = 'success';
            };
            reader.readAsText(file);
        }

        function downloadFile(content, filename, type) {
            const blob = new Blob([content], {type});
            const url = URL.createObjectURL(blob);
            const a = document.createElement('a');
            a.href = url;
            a.download = filename;
            a.click();
            URL.revokeObjectURL(url);
        }

        function updateStats() {
            const verified = JSON.parse(localStorage.getItem('verified') || '[]');
            const total = 30;
            const count = verified.length;
            const remaining = Math.max(0, total - count);
            localStorage.setItem('stats', JSON.stringify({count, remaining, total}));
        }

        function toggleTheme() {
            const html = document.documentElement;
            const icon = document.getElementById('theme-icon');
            const current = html.getAttribute('data-theme');
            
            if (current === 'dark') {
                html.removeAttribute('data-theme');
                icon.textContent = '☀️';
                localStorage.setItem('adminTheme', 'light');
            } else {
                html.setAttribute('data-theme', 'dark');
                icon.textContent = '🌙';
                localStorage.setItem('adminTheme', 'dark');
            }
        }

        if (localStorage.getItem('adminTheme') === 'dark') {
            document.documentElement.setAttribute('data-theme', 'dark');
            document.getElementById('theme-icon').textContent = '🌙';
        }
    </script>
</body>
        </html>

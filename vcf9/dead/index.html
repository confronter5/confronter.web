<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin - Confronter</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg: #ffffff;
            --fg: #111111;
            --card: #f5f5f5;
            --border: #e0e0e0;
            --accent: #2563eb;
            --danger: #dc2626;
        }
        [data-theme="dark"] {
            --bg: #000000;
            --fg: #ffffff;
            --card: #111111;
            --border: #333333;
            --accent: #3b82f6;
        }
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Inter', sans-serif; }
        body {
            background: var(--bg);
            color: var(--fg);
            min-height: 100vh;
            font-size: 13px;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        .login-box, .panel {
            background: var(--card);
            padding: 30px;
            border-radius: 16px;
            border: 1px solid var(--border);
            width: 100%;
            max-width: 420px;
            margin: 20px;
        }
        h1 { font-size: 16px; margin-bottom: 20px; text-align: center; }
        input {
            width: 100%;
            padding: 12px;
            background: var(--bg);
            border: 1px solid var(--border);
            border-radius: 8px;
            color: var(--fg);
            font-size: 13px;
            margin-bottom: 12px;
        }
        button {
            width: 100%;
            padding: 12px;
            background: var(--accent);
            color: white;
            border: none;
            border-radius: 8px;
            font-size: 13px;
            font-weight: 600;
            cursor: pointer;
        }
        .theme-toggle {
            position: fixed;
            top: 16px; right: 16px;
            width: 36px; height: 36px;
            border-radius: 50%;
            background: var(--card);
            border: 1px solid var(--border);
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            font-size: 16px;
        }
        .panel { display: none; }
        .section {
            margin-bottom: 20px;
            padding: 16px;
            background: var(--bg);
            border-radius: 12px;
            border: 1px solid var(--border);
        }
        .section h3 {
            font-size: 12px;
            text-transform: uppercase;
            letter-spacing: 1px;
            margin-bottom: 12px;
            color: var(--accent);
        }
        .stat-row {
            display: flex;
            justify-content: space-between;
            margin-bottom: 8px;
            font-size: 13px;
        }
        .stat-row span:last-child { font-weight: 700; }
        .toggle-btn {
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 10px 0;
        }
        .switch {
            position: relative;
            width: 44px;
            height: 24px;
            background: var(--border);
            border-radius: 12px;
            cursor: pointer;
            transition: 0.3s;
        }
        .switch.on { background: var(--accent); }
        .switch::after {
            content: '';
            position: absolute;
            width: 20px; height: 20px;
            background: white;
            border-radius: 50%;
            top: 2px; left: 2px;
            transition: 0.3s;
        }
        .switch.on::after { left: 22px; }
        table {
            width: 100%;
            font-size: 11px;
            border-collapse: collapse;
        }
        th, td {
            padding: 8px;
            text-align: left;
            border-bottom: 1px solid var(--border);
        }
        th { font-weight: 600; font-size: 10px; text-transform: uppercase; }
        .file-input {
            margin-bottom: 10px;
        }
        .success { color: var(--accent); }
        .error { color: var(--danger); }
    </style>
</head>
<body>
    <button class="theme-toggle" onclick="toggleTheme()">
        <span id="theme-icon">☀️</span>
    </button>

    <div class="login-box" id="login">
        <h1>🔐 Admin Access</h1>
        <input type="password" id="pass" placeholder="Password" onkeypress="if(event.key==='Enter')login()">
        <button onclick="login()">Enter</button>
        <p id="msg" style="text-align:center;margin-top:10px;font-size:12px;"></p>
    </div>

    <div class="panel" id="panel">
        <h1>⚡ Confronter Admin</h1>

        <div class="section">
            <h3>Stats</h3>
            <div class="stat-row">
                <span>Verified</span>
                <span id="admin-verified">0</span>
            </div>
            <div class="stat-row">
                <span>Remaining</span>
                <span id="admin-remaining">30</span>
            </div>
            <div class="stat-row">
                <span>Total Capacity</span>
                <span>30</span>
            </div>
        </div>

        <div class="section">
            <h3>Countdown Days</h3>
            <input type="number" id="days-input" value="30" min="1" max="365">
            <button onclick="saveDays()" style="margin-top:8px;">Update Days</button>
        </div>

        <div class="section">
            <h3>VCF File</h3>
            <div class="toggle-btn">
                <span>Available for Download</span>
                <div class="switch" id="vcf-switch" onclick="toggleVCF()"></div>
            </div>
            <input type="file" id="vcf-file" accept=".vcf" class="file-input" onchange="uploadVCF()">
            <small id="vcf-status">No file uploaded</small>
        </div>

        <div class="section">
            <h3>Verified Users</h3>
            <div style="max-height:200px;overflow-y:auto;">
                <table>
                    <thead>
                        <tr><th>Email</th><th>Phone</th><th>Date</th></tr>
                    </thead>
                    <tbody id="users-table"></tbody>
                </table>
            </div>
        </div>

        <button onclick="logout()" style="background:var(--danger);margin-top:10px;">Logout</button>
    </div>

    <script>
        const CORRECT_PASS = "confronter1";

        function login() {
            const pass = document.getElementById('pass').value;
            if (pass === CORRECT_PASS) {
                document.getElementById('login').style.display = 'none';
                document.getElementById('panel').style.display = 'block';
                loadAdminData();
            } else {
                document.getElementById('msg').textContent = "❌ Wrong password";
                document.getElementById('msg').className = "error";
            }
        }

        function logout() {
            document.getElementById('login').style.display = 'block';
            document.getElementById('panel').style.display = 'none';
            document.getElementById('pass').value = '';
            document.getElementById('msg').textContent = '';
        }

        function loadAdminData() {
            const verified = JSON.parse(localStorage.getItem('verified') || '[]');
            const stats = JSON.parse(localStorage.getItem('stats') || '{"count":0,"remaining":30}');
            
            document.getElementById('admin-verified').textContent = stats.count;
            document.getElementById('admin-remaining').textContent = stats.remaining;
            
            const days = localStorage.getItem('daysLeft') || '30';
            document.getElementById('days-input').value = days;
            
            const vcfEnabled = localStorage.getItem('vcfEnabled') === 'true';
            document.getElementById('vcf-switch').className = vcfEnabled ? 'switch on' : 'switch';
            
            const vcfData = localStorage.getItem('vcfData');
            document.getElementById('vcf-status').textContent = vcfData ? '✓ File uploaded' : 'No file uploaded';
            
            const tbody = document.getElementById('users-table');
            tbody.innerHTML = '';
            verified.slice().reverse().forEach(u => {
                const row = document.createElement('tr');
                const date = new Date(u.date).toLocaleDateString();
                row.innerHTML = `<td>${u.email}</td><td>${u.phone}</td><td>${date}</td>`;
                tbody.appendChild(row);
            });
        }

        function saveDays() {
            const days = document.getElementById('days-input').value;
            localStorage.setItem('daysLeft', days);
            alert('Days updated to ' + days);
        }

        function toggleVCF() {
            const current = localStorage.getItem('vcfEnabled') === 'true';
            localStorage.setItem('vcfEnabled', !current);
            document.getElementById('vcf-switch').className = !current ? 'switch on' : 'switch';
        }

        function uploadVCF() {
            const file = document.getElementById('vcf-file').files[0];
            if (!file) return;
            
            const reader = new FileReader();
            reader.onload = function(e) {
                localStorage.setItem('vcfData', e.target.result);
                document.getElementById('vcf-status').textContent = '✓ File uploaded: ' + file.name;
                document.getElementById('vcf-status').className = 'success';
            };
            reader.readAsText(file);
        }

        function toggleTheme() {
            const html = document.documentElement;
            const icon = document.getElementById('theme-icon');
            const current = html.getAttribute('data-theme');
            
            if (current === 'dark') {
                html.removeAttribute('data-theme');
                icon.textContent = '☀️';
                localStorage.setItem('adminTheme', 'light');
            } else {
                html.setAttribute('data-theme', 'dark');
                icon.textContent = '🌙';
                localStorage.setItem('adminTheme', 'dark');
            }
        }

        if (localStorage.getItem('adminTheme') === 'dark') {
            document.documentElement.setAttribute('data-theme', 'dark');
            document.getElementById('theme-icon').textContent = '🌙';
        }
    </script>
</body>
</html>
